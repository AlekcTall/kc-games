<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление ивентами – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .events-admin { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .events-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .events-tab { background: none; border: none; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; border-radius: 4px 4px 0 0; }
    .events-tab.active { background: var(--color-primary); color: white; }
    .events-list { list-style: none; padding: 0; }
    .events-list li { padding: 0.8rem; border-bottom: 1px solid #eee; }
    .events-list li .event-info { margin-bottom: 0.3rem; }
    .events-list li .event-actions { display: flex; gap: 0.3rem; margin-top: 0.5rem; }
    .event-form { background: #f9fafb; border-radius: 12px; padding: 1.5rem; max-width: 700px; margin-top: 1rem; }
    .event-form label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.3rem; }
    .event-form input, .event-form select, .event-form textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    .event-form .row { display: flex; gap: 1rem; }
    .event-form .row > div { flex: 1; }
    .btn-success { background: #27ae60; color: white; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-restart { background: #3498db; color: white; }
    .monitor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .monitor-card { background: #f9fafb; border-radius: 12px; padding: 1.2rem; text-align: center; }
    .monitor-card .value { font-size: 2rem; font-weight: 700; }
    .monitor-card .label { font-size: 0.8rem; color: #888; }
    .admin-event-item { background: #fffbe6; border: 1px solid #f0c040; border-radius: 8px; padding: 0.8rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-event-item .event-icon { font-size: 1.5rem; margin-right: 0.5rem; }
    .final-stats { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 0.8rem; margin-top: 0.5rem; font-size: 0.9rem; }
    .final-stats table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    .final-stats th, .final-stats td { padding: 0.3rem 0.5rem; border-bottom: 1px solid #ddd; text-align: left; }
    .final-stats th { background: #e6f7e6; }
    .final-stats img { max-width: 200px; border-radius: 6px; margin: 0.5rem 0; }
    .type-specific-fields { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container events-admin" id="events-admin-container">
      <p>Загрузка...</p>
    </div>
  </main>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/main.js"></script>

  <script>
    // ---- КОНФИГУРАЦИЯ ТИПОВ ИВЕНТОВ (добавлять сюда) ----
    const EVENT_TYPES = {
      tree: {
        label: 'Живое дерево',
        icon: '🌳',
        fields: [
          { id: 'maxHealth', label: 'Макс. здоровье', type: 'number', default: 1000 },
          { id: 'decayPerHour', label: 'Урон/час', type: 'number', default: 5, step: 0.5 },
          { id: 'minHealth', label: 'Мин. здоровье', type: 'number', default: 50 },
          { id: 'adaptiveMode', label: 'Адаптивный режим', type: 'checkbox', default: true },
          { id: 'dailyActionLimits', label: 'Лимиты действий (JSON)', type: 'json', default: { water: 5, bugs: 3, birds: 3, fertilize: 2, tie: 10, sing: 10 } },
          { id: 'lokoinActionCost', label: 'Стоимость локоин-действия', type: 'number', default: 5 },
          { id: 'lokoinActionBoost', label: 'Буст локоин-действия', type: 'number', default: 20 }
        ],
        monitor: async (event) => {
          const p = event.participants || {};
          const unique = Object.keys(p).filter(k => k !== '_lastDecay').length;
          const actions = Object.values(p).reduce((s, p) => s + Object.values(p.actions || {}).reduce((a, b) => a + b, 0), 0);
          return `<div class="monitor-card"><div class="value">${unique}</div><div class="label">Участников</div></div>
                  <div class="monitor-card"><div class="value">${actions}</div><div class="label">Действий</div></div>
                  <div class="monitor-card"><div class="value">${Math.round(event.health || (event.settings?.maxHealth || 1000))}</div><div class="label">Здоровье</div></div>`;
        },
        finish: async (event) => {
          const participants = event.participants || {};
          const ranked = [];
          for (const [uid, data] of Object.entries(participants)) {
            if (uid === '_lastDecay') continue;
            const userDoc = await db.collection('users').doc(uid).get();
            const u = userDoc.data() || {};
            if (u.role === 'admin') continue;
            ranked.push({ username: u.username || 'Аноним', department: u.department || '—', total: Object.values(data.actions || {}).reduce((a, b) => a + b, 0) });
          }
          ranked.sort((a, b) => b.total - a.total);
          const topPlayer = ranked[0];
          const deptMap = {};
          ranked.forEach(p => {
            if (!deptMap[p.department]) deptMap[p.department] = { totalActions: 0, topPlayer: '', topActions: 0 };
            deptMap[p.department].totalActions += p.total;
            if (p.total > deptMap[p.department].topActions) { deptMap[p.department].topPlayer = p.username; deptMap[p.department].topActions = p.total; }
          });
          return {
            uniqueParticipants: Object.keys(participants).filter(k => k !== '_lastDecay').length,
            totalActions: event.statistics?.totalActions || 0,
            topPlayer,
            departments: Object.entries(deptMap).map(([name, d]) => ({ name, totalActions: d.totalActions, topPlayer: d.topPlayer })),
            topParticipants: ranked.slice(0, 5)
          };
        }
      },
      pixel: {
        label: 'Пиксельная доска',
        icon: '🎨',
        fields: [
          { id: 'width', label: 'Ширина', type: 'number', default: 64 },
          { id: 'height', label: 'Высота', type: 'number', default: 64 },
          { id: 'cooldown', label: 'Кулдаун (сек)', type: 'number', default: 30 },
          { id: 'lokoinSkipCost', label: 'Пропуск кулдауна (лок.)', type: 'number', default: 2 },
          { id: 'palette', label: 'Палитра (JSON)', type: 'json', default: ['#FFFFFF','#C0C0C0','#808080','#000000','#FF0000','#800000','#FFFF00','#808000','#00FF00','#008000','#00FFFF','#008080','#0000FF','#000080','#FF00FF','#800080','#FFA500','#A52A2A','#FFC0CB','#FFD700'] }
        ],
        monitor: async (event) => {
          const board = event.boardData || {};
          const painters = event.painterStats || {};
          return `<div class="monitor-card"><div class="value">${Object.keys(painters).length}</div><div class="label">Художников</div></div>
                  <div class="monitor-card"><div class="value">${Object.keys(board).length}</div><div class="label">Пикселей</div></div>`;
        },
        finish: async (event) => {
          const painters = event.painterStats || {};
          const board = event.boardData || {};
          const ranked = [];
          for (const [uid, count] of Object.entries(painters)) {
            const userDoc = await db.collection('users').doc(uid).get();
            const u = userDoc.data() || {};
            if (u.role === 'admin') continue;
            ranked.push({ username: u.username || 'Аноним', department: u.department || '—', total: count });
          }
          ranked.sort((a, b) => b.total - a.total);
          const settings = event.settings || {};
          const w = settings.width || 64, h = settings.height || 64;
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = w; tempCanvas.height = h;
          const ctx = tempCanvas.getContext('2d');
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h);
          for (const [key, cell] of Object.entries(board)) {
            const [col, row] = key.split('_').map(Number);
            ctx.fillStyle = cell.color; ctx.fillRect(col, row, 1, 1);
          }
          return {
            totalPixels: Object.keys(board).length,
            uniqueParticipants: Object.keys(painters).length,
            imageData: tempCanvas.toDataURL('image/png'),
            topParticipants: ranked.slice(0, 5)
          };
        }
      }
    };

    // ---- ОСНОВНОЙ КОД ----
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('events-admin-container');
      let currentEventType = 'tree';

      auth.onAuthStateChanged(async user => {
        if (!user) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
        const doc = await db.collection('users').doc(user.uid).get();
        if (!doc.exists || doc.data().role !== 'admin') {
          container.innerHTML = '<p>Доступ запрещён.</p>';
          return;
        }
        renderBaseUI();
      });

      function renderBaseUI() {
        container.innerHTML = `
          <h2>🎪 Управление ивентами <a href="admin.html" class="btn btn-cancel" style="margin-left:1rem;">← В админку</a></h2>
          <div class="events-tabs">
            <button class="events-tab active" data-tab="list">Список ивентов</button>
            <button class="events-tab" data-tab="create">Создать ивент</button>
            <button class="events-tab" data-tab="monitor">Мониторинг</button>
          </div>
          <div id="events-tab-content"></div>
        `;
        document.querySelectorAll('.events-tab').forEach(t => t.addEventListener('click', function() {
          document.querySelectorAll('.events-tab').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          switch (this.dataset.tab) {
            case 'list': renderEventsList(); break;
            case 'create': renderCreateForm(); break;
            case 'monitor': renderMonitor(); break;
          }
        }));
        renderEventsList();
      }

      async function renderEventsList() {
        const content = document.getElementById('events-tab-content');
        content.innerHTML = '<p>Загрузка...</p>';
        const snap = await db.collection('events').orderBy('createdAt', 'desc').get();
        const events = [];
        snap.forEach(doc => events.push({ id: doc.id, ...doc.data() }));
        let html = '<h3>Все ивенты</h3>';
        if (!events.length) html += '<p>Нет созданных ивентов.</p>';
        else {
          html += '<ul class="events-list">';
          events.forEach(ev => {
            const typeCfg = EVENT_TYPES[ev.type] || { icon: '🎪', label: ev.type };
            html += `<li><div class="event-info"><strong>${typeCfg.icon} ${ev.title}</strong> (${ev.id}) — ${statusBadge(ev.status)} [${typeCfg.label}]`;
            if (ev.startTime) html += `<br><small>${new Date(ev.startTime.seconds*1000).toLocaleString('ru-RU')} → ${ev.endTime ? new Date(ev.endTime.seconds*1000).toLocaleString('ru-RU') : '—'}</small>`;
            html += `</div>`;
            if (ev.status === 'finished' && ev.finalStats) html += renderFinalStats(ev);
            html += `<div class="event-actions">
              <button class="btn btn-small edit-event-btn" data-id="${ev.id}">✏️</button>
              ${ev.status === 'draft' ? `<button class="btn btn-small btn-success start-event-btn" data-id="${ev.id}">▶️ Запустить</button>` : ''}
              ${ev.status === 'active' ? `<button class="btn btn-small btn-warning stop-event-btn" data-id="${ev.id}">⏹️ Завершить</button>` : ''}
              ${ev.status === 'finished' ? `<button class="btn btn-small btn-restart restart-event-btn" data-id="${ev.id}">🔄 Перезапустить</button>` : ''}
              <button class="btn btn-small btn-danger delete-event-btn" data-id="${ev.id}">🗑️</button>
            </div></li>`;
          });
          html += '</ul>';
        }
        content.innerHTML = html;

        // привязка кнопок (edit, start, stop, restart, delete)
        document.querySelectorAll('.edit-event-btn').forEach(b => b.addEventListener('click', () => {
          const ev = events.find(e => e.id === b.dataset.id);
          if (ev) renderCreateForm(ev);
        }));
        document.querySelectorAll('.start-event-btn').forEach(b => b.addEventListener('click', async () => {
          if (confirm('Запустить ивент?')) {
            await db.collection('events').doc(b.dataset.id).update({ status: 'active', startTime: firebase.firestore.FieldValue.serverTimestamp() });
            showToast('Ивент запущен', 'success');
            renderEventsList();
          }
        }));
        document.querySelectorAll('.stop-event-btn').forEach(b => b.addEventListener('click', async () => {
          if (confirm('Завершить ивент досрочно?')) {
            const eventRef = db.collection('events').doc(b.dataset.id);
            const doc = await eventRef.get();
            const event = { id: doc.id, ...doc.data() };
            const typeCfg = EVENT_TYPES[event.type];
            let finalStats = {};
            if (typeCfg && typeCfg.finish) finalStats = await typeCfg.finish(event);
            await eventRef.update({ status: 'finished', finalStats });
            showToast('Ивент завершён', 'success');
            renderEventsList();
          }
        }));
        document.querySelectorAll('.restart-event-btn').forEach(b => b.addEventListener('click', async () => {
          if (confirm('Перезапустить ивент?')) {
            await db.collection('events').doc(b.dataset.id).update({ status: 'active', statistics: { totalActions: 0, uniqueParticipants: 0 }, finalStats: null, participants: { _lastDecay: Date.now() }, boardData: {}, painterStats: {} });
            showToast('Ивент перезапущен', 'success');
            renderEventsList();
          }
        }));
        document.querySelectorAll('.delete-event-btn').forEach(b => b.addEventListener('click', async () => {
          if (confirm('Удалить ивент?')) { await db.collection('events').doc(b.dataset.id).delete(); showToast('Удалён', 'success'); renderEventsList(); }
        }));
      }

      function statusBadge(s) { return s === 'active' ? '🟢 Активен' : s === 'draft' ? '📝 Черновик' : '🏁 Завершён'; }

      function renderFinalStats(ev) {
        const fs = ev.finalStats || {};
        let html = `<div class="final-stats"><strong>📊 Итоги:</strong>`;
        if (fs.imageData) html += `<img src="${fs.imageData}" alt="Доска" style="max-width:200px;">`;
        html += `<table>`;
        if (fs.uniqueParticipants !== undefined) html += `<tr><td>Участников:</td><td><strong>${fs.uniqueParticipants}</strong></td></tr>`;
        if (fs.totalActions !== undefined) html += `<tr><td>Действий:</td><td><strong>${fs.totalActions}</strong></td></tr>`;
        if (fs.totalPixels !== undefined) html += `<tr><td>Пикселей:</td><td><strong>${fs.totalPixels}</strong></td></tr>`;
        if (fs.topPlayer) html += `<tr><td>👑 Лучший:</td><td><strong>${fs.topPlayer.username}</strong></td></tr>`;
        html += `</table></div>`;
        return html;
      }

      function renderCreateForm(existing = null) {
        const content = document.getElementById('events-tab-content');
        const isEdit = !!existing;
        const ev = existing || {};
        currentEventType = ev.type || 'tree';
        const typeCfg = EVENT_TYPES[currentEventType];
        const settings = ev.settings || {};

        let fieldsHtml = '';
        typeCfg.fields.forEach(f => {
          const val = settings[f.id] !== undefined ? settings[f.id] : f.default;
          if (f.type === 'checkbox') {
            fieldsHtml += `<div class="form-group"><label><input type="checkbox" id="field-${f.id}" ${val ? 'checked' : ''}> ${f.label}</label></div>`;
          } else if (f.type === 'json') {
            fieldsHtml += `<div class="form-group"><label for="field-${f.id}">${f.label}</label><textarea id="field-${f.id}" rows="3">${JSON.stringify(val, null, 2)}</textarea></div>`;
          } else {
            fieldsHtml += `<div class="form-group"><label for="field-${f.id}">${f.label}</label><input type="${f.type}" id="field-${f.id}" value="${val}"${f.step ? ` step="${f.step}"` : ''}></div>`;
          }
        });

        content.innerHTML = `
          <h3>${isEdit ? 'Редактировать' : 'Создать'} ивент</h3>
          <div class="event-form">
            <div class="row">
              <div><label>ID ивента</label><input type="text" id="event-id" value="${ev.id || ''}" ${isEdit ? 'disabled' : ''} required></div>
              <div><label>Тип</label><select id="event-type">${Object.entries(EVENT_TYPES).map(([k, v]) => `<option value="${k}" ${currentEventType === k ? 'selected' : ''}>${v.icon} ${v.label}</option>`).join('')}</select></div>
            </div>
            <div class="row">
              <div><label>Название</label><input type="text" id="event-title" value="${ev.title || ''}" required></div>
              <div><label>Иконка</label><input type="text" id="event-icon" value="${ev.icon || typeCfg.icon}"></div>
            </div>
            <label>Описание</label><textarea id="event-desc" rows="2">${ev.description || ''}</textarea>
            <label>URL страницы ивента</label><input type="text" id="event-url" value="${ev.url || (currentEventType === 'pixel' ? 'events/pixel-board.html' : 'events/tree.html')}">
            <div class="row"><div><label>Начало</label><input type="datetime-local" id="event-start" value="${ev.startTime ? toDatetimeLocal(ev.startTime.toDate()) : ''}"></div><div><label>Окончание</label><input type="datetime-local" id="event-end" value="${ev.endTime ? toDatetimeLocal(ev.endTime.toDate()) : ''}"></div></div>
            <h4>Настройки типа «${typeCfg.label}»</h4>
            <div id="type-specific-fields">${fieldsHtml}</div>
            <h4>Награды</h4>
            <div class="row"><div><label>За участие (баллы)</label><input type="number" id="reward-participation" value="${(ev.rewards?.participation?.points) || 10}"></div><div><label>За участие (локоины)</label><input type="number" id="reward-participation-lokoin" value="${(ev.rewards?.participation?.lokoin) || 2}"></div></div>
            <div class="row"><div><label>За победу (баллы)</label><input type="number" id="reward-win" value="${(ev.rewards?.win?.points) || 50}"></div><div><label>За победу (локоины)</label><input type="number" id="reward-win-lokoin" value="${(ev.rewards?.win?.lokoin) || 10}"></div></div>
            <button class="btn" id="save-event-btn">Сохранить</button>
            <p id="event-form-message" class="auth-message"></p>
          </div>
        `;

        document.getElementById('event-type').addEventListener('change', function() {
          currentEventType = this.value;
          renderCreateForm(isEdit ? { ...ev, type: currentEventType } : null);
        });

        document.getElementById('save-event-btn').addEventListener('click', async () => {
          const id = document.getElementById('event-id').value.trim();
          if (!id) { document.getElementById('event-form-message').textContent = 'Введите ID'; return; }
          const type = currentEventType;
          const cfg = EVENT_TYPES[type];
          const settings = {};
          cfg.fields.forEach(f => {
            if (f.type === 'checkbox') settings[f.id] = document.getElementById(`field-${f.id}`).checked;
            else if (f.type === 'json') {
              try { settings[f.id] = JSON.parse(document.getElementById(`field-${f.id}`).value); } catch (e) { settings[f.id] = f.default; }
            } else settings[f.id] = document.getElementById(`field-${f.id}`).value;
          });
          const data = {
            type,
            title: document.getElementById('event-title').value.trim(),
            description: document.getElementById('event-desc').value.trim(),
            icon: document.getElementById('event-icon').value.trim() || cfg.icon,
            url: document.getElementById('event-url').value.trim(),
            startTime: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('event-start').value)),
            endTime: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('event-end').value)),
            settings,
            rewards: {
              participation: { points: parseInt(document.getElementById('reward-participation').value) || 0, lokoin: parseInt(document.getElementById('reward-participation-lokoin').value) || 0 },
              win: { points: parseInt(document.getElementById('reward-win').value) || 0, lokoin: parseInt(document.getElementById('reward-win-lokoin').value) || 0 }
            },
            status: isEdit ? ev.status : 'draft',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          if (!isEdit) {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            data.statistics = { totalActions: 0, uniqueParticipants: 0 };
            data.participants = {};
            data.boardData = {};
            data.painterStats = {};
          }
          try {
            await db.collection('events').doc(id).set(data, { merge: true });
            showToast('Ивент сохранён', 'success');
            renderEventsList();
          } catch (err) { document.getElementById('event-form-message').textContent = 'Ошибка: ' + err.message; }
        });
      }

      async function renderMonitor() {
        const content = document.getElementById('events-tab-content');
        content.innerHTML = '<p>Загрузка...</p>';
        const activeSnap = await db.collection('events').where('status', '==', 'active').limit(1).get();
        if (activeSnap.empty) { content.innerHTML = '<p>Нет активных ивентов.</p>'; return; }
        const event = { id: activeSnap.docs[0].id, ...activeSnap.docs[0].data() };
        const typeCfg = EVENT_TYPES[event.type] || {};
        let html = `<h3>Мониторинг: ${typeCfg.icon || '🎪'} ${event.title} (${typeCfg.label || event.type})</h3><div class="monitor-grid">`;
        if (typeCfg.monitor) html += await typeCfg.monitor(event);
        else html += `<div class="monitor-card"><div class="value">—</div><div class="label">Нет метрик</div></div>`;
        html += `<div class="monitor-card"><div class="value">${event.status}</div><div class="label">Статус</div></div></div>`;
        if (event.type === 'tree') {
          html += '<h4 style="margin-top:1.5rem;">⚡ Ручные события</h4><div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">';
          const ACTIONS = [{id:'frost',icon:'🥶',name:'Заморозки',health:-15},{id:'locusts',icon:'🦗',name:'Саранча',health:-10},{id:'birds',icon:'🐦',name:'Птицы',health:-8},{id:'hurricane',icon:'🌪️',name:'Ураган',health:-25},{id:'drought',icon:'🔥',name:'Засуха',health:-5},{id:'salt',icon:'🧂',name:'Засоление',health:0},{id:'rainbow',icon:'🌈',name:'Радуга',health:20},{id:'ladybug',icon:'🐞',name:'Божьи коровки',health:5}];
          ACTIONS.forEach(ae => html += `<button class="btn btn-small trigger-admin-event-btn" data-type="${ae.id}" data-health="${ae.health}">${ae.icon} ${ae.name}</button>`);
          html += '</div><div id="admin-events-history">Загрузка...</div>';
        }
        content.innerHTML = html;
        if (event.type === 'tree') {
          const historySnap = await db.collection('events').doc(event.id).collection('events').orderBy('timestamp','desc').limit(20).get();
          document.getElementById('admin-events-history').innerHTML = historySnap.empty ? '<p>Нет ручных событий.</p>' : historySnap.docs.map(d => `<div class="admin-event-item"><span><span class="event-icon">${d.data().icon}</span> ${d.data().name}</span><small>${d.data().timestamp ? new Date(d.data().timestamp.seconds*1000).toLocaleString('ru-RU') : ''}</small></div>`).join('');
          document.querySelectorAll('.trigger-admin-event-btn').forEach(btn => btn.addEventListener('click', async () => {
            await db.collection('events').doc(event.id).collection('events').add({ type: btn.dataset.type, name: btn.textContent.trim(), icon: btn.dataset.icon, healthChange: parseInt(btn.dataset.health), timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            showToast('Применено', 'success'); renderMonitor();
          }));
        }
      }

      function toDatetimeLocal(date) { return date.toISOString().slice(0, 16); }
    });
  </script>
</body>
</html>
