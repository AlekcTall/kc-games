<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинг – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .star-rating-name { color: #FBBF24; font-weight: 700; text-shadow: 0 0 5px rgba(251,191,36,0.5); }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link active">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>
  <main class="main">
    <div class="container">
      <h2>Таблица лидеров</h2>
      <div id="leaderboard-container"><p class="no-results">Загрузка...</p></div>
    </div>
  </main>
  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/main.js"></script>
  <script>
    let departmentsList = [];
    async function loadDepartments() {
      try { const snap = await db.collection('departments').orderBy('name').get(); departmentsList = []; snap.forEach(doc => departmentsList.push(doc.data().name)); if (departmentsList.length === 0) departmentsList = ['РБ','МСБ','ТМ','Депозиты','ОКК','ООБП','Боссы','Заблудшие души']; } catch(e) { departmentsList = ['Не удалось загрузить']; }
    }
    document.addEventListener('DOMContentLoaded', async () => {
      await loadDepartments();
      const container = document.getElementById('leaderboard-container');
      auth.onAuthStateChanged(user => {
        if (!user) { container.innerHTML = '<p class="no-results">Войдите, чтобы увидеть рейтинг.</p>'; return; }
        buildUI();
      });
      function buildUI() {
        container.innerHTML = `<div class="leaderboard-filters" id="filters-block"><button class="filters-toggle" id="filters-toggle" style="display:none;">Фильтры</button><div class="filter-row"><div class="filter-group"><label>🔍 Имя</label><input type="text" id="filter-name"></div><div class="filter-group"><label>📊 Баллы</label><div class="filter-range"><input type="number" id="filter-points-min" placeholder="От"><span>–</span><input type="number" id="filter-points-max" placeholder="До"></div></div><div class="filter-group"><label>🏢 Отдел</label><select id="filter-department"><option value="">Все</option></select></div><div class="filter-group"><label>🏆 Достижения</label><select id="filter-achievements"><option value="all">Все</option><option value="some">Есть</option><option value="none">Нет</option></select></div><div class="filter-group" style="justify-content:flex-end;"><button class="btn-reset-filters" id="reset-filters-btn">↺ Сбросить</button></div></div></div><div id="leaderboard-table-container"></div>`;
        const filterDept=document.getElementById('filter-department'),filterAch=document.getElementById('filter-achievements'),filterName=document.getElementById('filter-name'),filterPointsMin=document.getElementById('filter-points-min'),filterPointsMax=document.getElementById('filter-points-max'),resetBtn=document.getElementById('reset-filters-btn'),filtersBlock=document.getElementById('filters-block'),filtersToggle=document.getElementById('filters-toggle'),tableContainer=document.getElementById('leaderboard-table-container');
        departmentsList.forEach(d=>{filterDept.add(new Option(d,d));});
        let allUsers=[];
        async function load(){try{const snap=await db.collection('users').get();allUsers=[];snap.forEach(doc=>{const d=doc.data();allUsers.push({uid:doc.id,id:doc.id,username:d.username||'Без имени',department:d.department||'',points:d.points||0,role:d.role||'user',achievements:d.achievements||[],purchasedItems:d.purchasedItems||[]});});render();}catch(e){tableContainer.innerHTML='<p class="no-results">Не удалось загрузить рейтинг.</p>';}}
        function render(){let f=allUsers.filter(u=>u.role!=='admin');if(filterDept.value)f=f.filter(u=>u.department===filterDept.value);const af=filterAch.value;if(af==='some')f=f.filter(u=>u.achievements.length>0);else if(af==='none')f=f.filter(u=>u.achievements.length===0);const n=filterName.value.trim().toLowerCase();if(n)f=f.filter(u=>u.username.toLowerCase().includes(n));const pMin=parseInt(filterPointsMin.value,10),pMax=parseInt(filterPointsMax.value,10);if(!isNaN(pMin))f=f.filter(u=>u.points>=pMin);if(!isNaN(pMax))f=f.filter(u=>u.points<=pMax);f.sort((a,b)=>b.points-a.points);
        if(!f.length){tableContainer.innerHTML='<p class="no-results">Никто не найден.</p>';return;}
        let html='<table class="leaderboard-table"><thead><tr><th>Место</th><th>Игрок</th><th>Баллы</th><th>Отдел</th><th>🏆</th></tr></thead><tbody>';
        f.forEach((u,i)=>{let cls=i===0?'top-1':i===1?'top-2':i===2?'top-3':'';const av=typeof renderAvatarDiv==='function'?renderAvatarDiv(u):`<div class="avatar-circle avatar-small" style="background:${getColorFromUid(u.uid)}">${getInitials(u.username)}</div>`;const hasStar=u.purchasedItems.includes('star_rating');const nameClass=hasStar?'player-name-link star-rating-name':'player-name-link';html+=`<tr class="${cls}"><td class="place-cell">#${i+1}</td><td class="player-cell">${av}<a href="public-profile.html?id=${u.id}" class="${nameClass}">${u.username}</a></td><td>${u.points}</td><td>${u.department||'—'}</td><td>${u.achievements.length}</td></tr>`;});
        html+='</tbody></table>';tableContainer.innerHTML=html;}
        [filterDept,filterAch,filterName,filterPointsMin,filterPointsMax].forEach(el=>{el.addEventListener('input',render);el.addEventListener('change',render);});
        resetBtn.addEventListener('click',()=>{filterName.value='';filterPointsMin.value='';filterPointsMax.value='';filterDept.value='';filterAch.value='all';render();});
        function checkMobile(){if(window.innerWidth<=768){filtersToggle.style.display='block';filtersBlock.classList.add('filters-collapsed');}else{filtersToggle.style.display='none';filtersBlock.classList.remove('filters-collapsed');}}
        filtersToggle.addEventListener('click',()=>filtersBlock.classList.toggle('filters-collapsed'));window.addEventListener('resize',checkMobile);checkMobile();
        load();
      }
    });
  </script>
</body>
</html>
