<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игры – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link active">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <h2>Доступные игры</h2>
      <div id="games-grid" class="games-grid">
        <!-- Карточки сгенерируются скриптом -->
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ваши амбассадоры</p>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Предустановленные игры, если ничего нет
  const DEFAULT_GAMES = [
  {
    id: 'clicker',
    icon: '🖱️',
    title: 'Кликер',
    description: 'Набери 20 кликов и получи 1 балл.',
    url: 'games/clicker.html'
  },
  {
    id: 'memory',
    icon: '🧠',
    title: 'Найди пару',
    description: 'Открой все пары и получи 5 баллов.',
    url: 'games/memory.html'
  },
  {
    id: 'snake',
    icon: '🐍',
    title: 'Змейка',
    description: 'Съешь 5 яблок и получи 1 балл.',
    url: 'games/snake.html'
  }
];

    function getGames() {
      const stored = JSON.parse(localStorage.getItem('krugames_games'));
      return stored || [];
    }

    function saveGames(games) {
      localStorage.setItem('krugames_games', JSON.stringify(games));
    }

    function initDefaultGames() {
      const games = getGames();
      if (games.length === 0) {
        saveGames(DEFAULT_GAMES);
        return DEFAULT_GAMES;
      }
      return games;
    }

    function renderGames() {
      const grid = document.getElementById('games-grid');
      if (!grid) return;

      const gamesData = initDefaultGames(); // автоматически добавит, если пусто

      if (gamesData.length === 0) {
        grid.innerHTML = '<p>Пока нет игр. Загляните позже!</p>';
        return;
      }

      let html = '';
      gamesData.forEach(game => {
        html += `
          <div class="game-card">
            <div class="game-card__icon">${game.icon}</div>
            <h3 class="game-card__title">${game.title}</h3>
            <p class="game-card__desc">${game.description}</p>
            <button class="btn game-card__btn" data-game-id="${game.id}">Играть</button>
          </div>
        `;
      });
      grid.innerHTML = html;

      document.querySelectorAll('.game-card__btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const gameId = e.target.dataset.gameId;
          const game = gamesData.find(g => g.id === gameId);
          if (game) {
            if (game.url) {
              window.location.href = game.url;
            } else {
              showToast(`Игра "${game.title}" ещё не добавлена.`, 'info');
            }
          }
        });
      });
    }

    document.addEventListener('DOMContentLoaded', renderGames);
  </script>
</body>
</html>
