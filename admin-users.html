<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пользователи – Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    .admin-tab { background: none; border: none; padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; border-radius: 4px 4px 0 0; }
    .admin-tab.active { background: var(--color-primary); color: white; }
    .admin-users-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-users-table th, .admin-users-table td { padding: 0.5rem; border-bottom: 1px solid #eee; text-align: left; }
    .admin-users-table th { background: #f9f9f9; font-weight: 600; }
    .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0.1rem; }
    .btn-gift { background: #9b59b6; color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-left: 0.3rem; }
    .btn-gift:hover { background: #8e44ad; }
    .editable select, .editable input { width: 100%; padding: 0.25rem; border: 1px solid #ccc; border-radius: 4px; }
    .award-icon-preview { width: 32px; height: 32px; vertical-align: middle; margin-right: 0.5rem; }
    .skeleton-row td { padding: 0.5rem; }
    .skeleton-cell { height: 1rem; background: #e0e0e0; border-radius: 4px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .requests-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .requests-table th, .requests-table td { padding: 0.5rem; border-bottom: 1px solid #eee; text-align: left; }
    .requests-table th { background: #f9f9f9; font-weight: 600; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: var(--color-primary); text-decoration: none; }
    @media (max-width: 768px) {
      .admin-users-table { font-size: 0.8rem; }
      .admin-tabs { flex-wrap: wrap; }
    }
    .modal textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link active">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container admin-page" id="admin-container">
      <p>Загрузка...</p>
    </div>
  </main>

  <!-- Модальные окна (локоины, подарок, награда) -->
  <div class="modal-overlay" id="lokoin-modal" style="display:none;">
    <div class="modal"><span class="modal-close" id="lokoin-modal-close">&times;</span><h3>Изменить баланс локоинов</h3><div class="form-group"><label for="lokoin-amount">Количество</label><input type="number" id="lokoin-amount" step="1"></div><div class="form-group"><label for="lokoin-comment">Комментарий</label><input type="text" id="lokoin-comment"></div><button class="btn" id="lokoin-submit">Применить</button><p id="lokoin-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="gift-modal" style="display:none;">
    <div class="modal"><span class="modal-close" id="gift-modal-close">&times;</span><h3>Подарить товар</h3><p id="gift-user-name"></p><div class="form-group"><label for="gift-item-select">Товар</label><select id="gift-item-select"></select></div><button class="btn" id="gift-submit">Подарить</button><p id="gift-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="award-user-modal" style="display:none;">
    <div class="modal" style="max-width:450px;"><span class="modal-close" id="award-user-modal-close">&times;</span><h3>Выдать награду</h3><p id="award-user-name"></p><div class="form-group"><label for="award-select">Награда</label><select id="award-select"></select></div><div class="form-group"><label for="award-comment">Комментарий</label><textarea id="award-comment" rows="2"></textarea></div><button class="btn" id="award-user-submit">Выдать</button><p id="award-user-message" class="auth-message"></p></div>
  </div>

  <!-- Модальное окно для комментария к заявке -->
  <div class="modal-overlay" id="request-done-modal" style="display:none;">
    <div class="modal" style="max-width:450px;">
      <span class="modal-close" id="request-done-modal-close">&times;</span>
      <h3>Заявка выполнена</h3>
      <p id="request-done-info"></p>
      <div class="form-group">
        <label for="request-done-comment">Комментарий (необязательно)</label>
        <textarea id="request-done-comment" rows="3" placeholder="Например: подойдите в 312 кабинет за призом"></textarea>
      </div>
      <button class="btn" id="request-done-submit">Отправить уведомление</button>
      <p id="request-done-message" class="auth-message"></p>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feedback.js"></script>

  <script>
    (function() {
      const CACHE_USERS_KEY = 'krugames_admin_users';
      const CACHE_TTL = 2 * 60 * 1000;
      let departmentsCache = [];
      let allUsers = [];

      async function loadDepartments() {
        try {
          const s = await db.collection('departments').orderBy('name').get();
          departmentsCache = [];
          s.forEach(d => departmentsCache.push({ id: d.id, name: d.data().name }));
          if (!departmentsCache.length) {
            const def = ['РБ','МСБ','ТМ','Депозиты','ОКК','ООБП','Боссы','Заблудшие души'];
            for (const n of def) await db.collection('departments').add({ name: n });
            return loadDepartments();
          }
        } catch (e) {
          departmentsCache = def.map((n,i)=>({id:'fb'+i, name:n}));
        }
      }

      function getCachedUsers() {
        const cached = sessionStorage.getItem(CACHE_USERS_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.timestamp < CACHE_TTL) return parsed.data;
          } catch (e) {}
        }
        return null;
      }

      function setCachedUsers(users) {
        sessionStorage.setItem(CACHE_USERS_KEY, JSON.stringify({ timestamp: Date.now(), data: users }));
      }

      document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('admin-container');
        auth.onAuthStateChanged(async fbUser => {
          if (!fbUser) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
          try {
            const d = await db.collection('users').doc(fbUser.uid).get();
            if (!d.exists || d.data().role !== 'admin') {
              container.innerHTML = '<p>Доступ запрещён.</p>';
              return;
            }
            await loadDepartments();
            renderPage();
          } catch (err) { container.innerHTML = `<p>Ошибка: ${err.message}</p>`; }
        });

        function renderPage() {
          container.innerHTML = `
            <a href="admin.html" class="back-link">← В админку</a>
            <h2>👥 Управление пользователями</h2>
            <div class="admin-tabs">
              <button class="admin-tab active" data-tab="users">Пользователи</button>
              <button class="admin-tab" data-tab="requests">Заявки на реализацию</button>
            </div>
            <div id="admin-tab-content"></div>
          `;
          document.querySelectorAll('.admin-tab').forEach(t => t.addEventListener('click', function() {
            document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            loadTab(this.dataset.tab);
          }));
          loadTab('users');

          function loadTab(tab) {
            if (tab === 'users') renderUsersTab();
            else if (tab === 'requests') renderRequestsTab();
          }
        }

        // ... (весь код отрисовки пользователей и редактирования остаётся без изменений) ...

        // ----- Заявки -----
        async function renderRequestsTab() {
          const content = document.getElementById('admin-tab-content');
          content.innerHTML = '<p>Загрузка...</p>';
          try {
            const snap = await db.collection('purchaseRequests').orderBy('createdAt', 'desc').get();
            const requests = [];
            snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));

            let html = `<h3>📋 Заявки на реализацию (${requests.length})</h3>`;
            if (!requests.length) {
              html += '<p>Нет заявок.</p>';
            } else {
              html += `<table class="requests-table">
                <thead><tr><th>Пользователь</th><th>Отдел</th><th>Товар</th><th>Цена</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody>`;
              requests.forEach(r => {
                const statusText = r.status === 'new' ? '🆕 Новое' : r.status === 'progress' ? '🔄 В работе' : '✅ Выполнено';
                const date = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleString('ru-RU') : '';
                html += `<tr>
                  <td>${r.username}</td>
                  <td>${r.department || '—'}</td>
                  <td>${r.itemTitle}</td>
                  <td>${r.itemPrice} лок.</td>
                  <td>${date}</td>
                  <td>${statusText}</td>
                  <td>
                    <select class="request-status" data-req-id="${r.id}" data-user-id="${r.userId || ''}" data-item="${r.itemTitle || ''}">
                      <option value="new" ${r.status === 'new' ? 'selected' : ''}>Новое</option>
                      <option value="progress" ${r.status === 'progress' ? 'selected' : ''}>В работе</option>
                      <option value="done" ${r.status === 'done' ? 'selected' : ''}>Выполнено</option>
                    </select>
                  </td>
                </tr>`;
              });
              html += '</tbody></table>';
            }
            content.innerHTML = html;

            // Обработчик изменения статуса
            document.querySelectorAll('.request-status').forEach(sel => {
              sel.addEventListener('change', async function() {
                const newStatus = this.value;
                const reqId = this.dataset.reqId;
                const userId = this.dataset.userId;
                const itemTitle = this.dataset.item;

                if (newStatus === 'done') {
                  // Показать модальное окно для комментария
                  openRequestDoneModal(reqId, userId, itemTitle);
                } else {
                  // Для других статусов просто обновляем
                  await db.collection('purchaseRequests').doc(reqId).update({ status: newStatus });
                  showToast('Статус обновлён', 'success');
                }
              });
            });
          } catch (e) {
            content.innerHTML = '<p>Ошибка загрузки заявок.</p>';
          }
        }

        // Модальное окно "Заявка выполнена"
        function openRequestDoneModal(reqId, userId, itemTitle) {
          document.getElementById('request-done-info').textContent = 
            `Товар: ${itemTitle}. Пользователь получит уведомление.`;
          document.getElementById('request-done-comment').value = '';
          document.getElementById('request-done-message').textContent = '';
          document.getElementById('request-done-modal').style.display = 'flex';

          // Обработчик отправки
          document.getElementById('request-done-submit').onclick = async () => {
            const comment = document.getElementById('request-done-comment').value.trim();
            try {
              // Обновляем заявку
              await db.collection('purchaseRequests').doc(reqId).update({
                status: 'done',
                doneAt: firebase.firestore.FieldValue.serverTimestamp(),
                adminComment: comment || ''
              });

              // Отправляем уведомление пользователю, если userId известен
              if (userId && typeof addNotification === 'function') {
                let message = `Ваш запрос на "${itemTitle}" обработан.`;
                if (comment) message += ` Комментарий: ${comment}`;
                await addNotification(userId, message, 'purchase', 'profile.html');
              }

              showToast('Заявка выполнена, уведомление отправлено', 'success');
              document.getElementById('request-done-modal').style.display = 'none';
              // Обновляем список заявок
              renderRequestsTab();
            } catch (err) {
              document.getElementById('request-done-message').textContent = 'Ошибка: ' + err.message;
            }
          };
        }

        // Закрытие модального окна
        document.getElementById('request-done-modal-close').addEventListener('click', () => {
          document.getElementById('request-done-modal').style.display = 'none';
        });
      });
    })();
  </script>
</body>
</html>
