<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link active">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container" id="admin-container">
      <!-- Контент будет отрисован скриптом -->
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 Контактный центр. Геймификация труда.</p>
    </div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/main.js"></script>
  <script>
    const DEPARTMENTS = [
      'РБ (Физические лица)',
      'МСБ (Юридические лица)',
      'ТМ (Телемаркетинг)',
      'Депозиты (группа привлечения некредитных продуктов)',
      'ОКК (отдел контроля качества)',
      'ООБП (отдел оптимизации бизнес процессов)',
      'Боссы (начальники и руководители начальников)',
      'Заблудшие души КЦ (в каком отделе КЦ я работаю?)'
    ];

    const STORAGE_DELETED_KEY = 'krugames_deleted_users';

    function getDeletedUsers() {
      const data = localStorage.getItem(STORAGE_DELETED_KEY);
      return data ? JSON.parse(data) : [];
    }

    function saveDeletedUsers(deletedUsers) {
      localStorage.setItem(STORAGE_DELETED_KEY, JSON.stringify(deletedUsers));
    }

    function moveUserToTrash(userId) {
      const users = getUsers();
      const userIndex = users.findIndex(u => u.id == userId);
      if (userIndex === -1) return false;
      const [user] = users.splice(userIndex, 1);
      saveUsers(users);
      const deletedUsers = getDeletedUsers();
      deletedUsers.push(user);
      saveDeletedUsers(deletedUsers);
      return true;
    }

    function restoreUserFromTrash(userId) {
      const deletedUsers = getDeletedUsers();
      const index = deletedUsers.findIndex(u => u.id == userId);
      if (index === -1) return false;
      const [user] = deletedUsers.splice(index, 1);
      saveDeletedUsers(deletedUsers);
      const users = getUsers();
      users.push(user);
      saveUsers(users);
      return true;
    }

    function permanentlyDeleteUser(userId) {
      let deletedUsers = getDeletedUsers();
      deletedUsers = deletedUsers.filter(u => u.id != userId);
      saveDeletedUsers(deletedUsers);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('admin-container');
      const currentUser = getCurrentUser();

      if (!currentUser || currentUser.role !== 'admin') {
        container.innerHTML = '<p>Доступ запрещён. Войдите как администратор.</p>';
        return;
      }

      container.innerHTML = `
        <h2>Панель администратора</h2>
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="games">Игры</button>
          <button class="admin-tab" data-tab="users">Пользователи</button>
          <button class="admin-tab" data-tab="trash">Корзина</button>
        </div>
        <div id="admin-content" class="admin-content"></div>
      `;

      const tabButtons = container.querySelectorAll('.admin-tab');
      const contentArea = document.getElementById('admin-content');
      let currentTab = 'games';

      tabButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          tabButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentTab = btn.dataset.tab;
          renderTab(currentTab);
        });
      });

      function renderTab(tab) {
        if (tab === 'games') renderGamesTab();
        else if (tab === 'users') renderUsersTab();
        else if (tab === 'trash') renderTrashTab();
      }

      // ========== ВКЛАДКА "ИГРЫ" ==========
      function renderGamesTab() {
        const games = getGames();
        let html = `
          <div class="admin-games">
            <h3>Список игр (${games.length})</h3>
            <div class="games-list" id="games-list">
              ${games.map(game => `
                <div class="admin-game-item" data-game-id="${game.id}">
                  <div class="admin-game-info">
                    <span class="admin-game-icon">${game.icon}</span>
                    <div>
                      <strong>${game.title}</strong> (${game.points} баллов)
                      <br><small>${game.description}</small>
                      <br><small>URL: ${game.url}</small>
                    </div>
                  </div>
                  <div class="admin-game-actions">
                    <button class="btn-edit" data-action="edit-game" data-game-id="${game.id}">✏️</button>
                    <button class="btn-delete" data-action="delete-game" data-game-id="${game.id}">🗑️</button>
                  </div>
                </div>
              `).join('')}
            </div>
            <button class="btn" id="add-game-btn">Добавить игру</button>
            <div id="game-form-container" style="display:none; margin-top:1rem;"></div>
          </div>
        `;
        contentArea.innerHTML = html;

        document.querySelectorAll('[data-action="edit-game"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const gameId = e.target.dataset.gameId;
            showEditGameForm(gameId);
          });
        });

        document.querySelectorAll('[data-action="delete-game"]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const gameId = e.target.dataset.gameId;
            deleteGame(gameId);
          });
        });

        document.getElementById('add-game-btn').addEventListener('click', () => {
          showAddGameForm();
        });
      }

      function showAddGameForm() {
        const formContainer = document.getElementById('game-form-container');
        formContainer.style.display = 'block';
        formContainer.innerHTML = `
          <h4>Новая игра</h4>
          <div class="form-group">
            <label>ID (уникальный)</label>
            <input type="text" id="game-id" placeholder="например, clicker">
          </div>
          <div class="form-group">
            <label>Название</label>
            <input type="text" id="game-title" placeholder="Название игры">
          </div>
          <div class="form-group">
            <label>Описание</label>
            <textarea id="game-desc" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>Иконка (эмодзи)</label>
            <input type="text" id="game-icon" placeholder="🕹️">
          </div>
          <div class="form-group">
            <label>URL файла игры</label>
            <input type="text" id="game-url" placeholder="games/clicker.html">
          </div>
          <div class="form-group">
            <label>Баллы за прохождение</label>
            <input type="number" id="game-points" value="10" min="1">
          </div>
          <button class="btn" id="save-game-btn">Сохранить</button>
          <button class="btn btn-cancel" id="cancel-game-btn">Отмена</button>
          <p id="game-form-message" class="auth-message"></p>
        `;

        document.getElementById('save-game-btn').addEventListener('click', () => {
          const id = document.getElementById('game-id').value.trim();
          const title = document.getElementById('game-title').value.trim();
          const desc = document.getElementById('game-desc').value.trim();
          const icon = document.getElementById('game-icon').value.trim();
          const url = document.getElementById('game-url').value.trim();
          const points = parseInt(document.getElementById('game-points').value) || 10;
          const messageEl = document.getElementById('game-form-message');

          if (!id || !title) {
            messageEl.textContent = 'ID и название обязательны.';
            showToast('ID и название обязательны', 'error');
            return;
          }

          const games = getGames();
          if (games.find(g => g.id === id)) {
            messageEl.textContent = 'Игра с таким ID уже существует.';
            showToast('Игра с таким ID уже существует', 'error');
            return;
          }

          games.push({ id, title, description: desc, icon, url, points });
          saveGames(games);
          showToast('Игра добавлена', 'success');
          renderGamesTab();
        });

        document.getElementById('cancel-game-btn').addEventListener('click', () => {
          formContainer.style.display = 'none';
        });
      }

      function showEditGameForm(gameId) {
        const games = getGames();
        const game = games.find(g => g.id === gameId);
        if (!game) return;

        const formContainer = document.getElementById('game-form-container');
        formContainer.style.display = 'block';
        formContainer.innerHTML = `
          <h4>Редактирование: ${game.title}</h4>
          <div class="form-group">
            <label>Название</label>
            <input type="text" id="edit-title" value="${game.title}">
          </div>
          <div class="form-group">
            <label>Описание</label>
            <textarea id="edit-desc" rows="2">${game.description}</textarea>
          </div>
          <div class="form-group">
            <label>Иконка (эмодзи)</label>
            <input type="text" id="edit-icon" value="${game.icon}">
          </div>
          <div class="form-group">
            <label>URL файла игры</label>
            <input type="text" id="edit-url" value="${game.url}">
          </div>
          <div class="form-group">
            <label>Баллы за прохождение</label>
            <input type="number" id="edit-points" value="${game.points}" min="1">
          </div>
          <button class="btn" id="update-game-btn">Обновить</button>
          <button class="btn btn-cancel" id="cancel-edit-btn">Отмена</button>
          <p id="edit-message" class="auth-message"></p>
        `;

        document.getElementById('update-game-btn').addEventListener('click', () => {
          const newTitle = document.getElementById('edit-title').value.trim();
          const newDesc = document.getElementById('edit-desc').value.trim();
          const newIcon = document.getElementById('edit-icon').value.trim();
          const newUrl = document.getElementById('edit-url').value.trim();
          const newPoints = parseInt(document.getElementById('edit-points').value) || 10;
          const messageEl = document.getElementById('edit-message');

          if (!newTitle) {
            messageEl.textContent = 'Название не может быть пустым.';
            showToast('Название обязательно', 'error');
            return;
          }

          const games = getGames();
          const idx = games.findIndex(g => g.id === gameId);
          if (idx !== -1) {
            games[idx].title = newTitle;
            games[idx].description = newDesc;
            games[idx].icon = newIcon;
            games[idx].url = newUrl;
            games[idx].points = newPoints;
            saveGames(games);
            showToast('Игра обновлена', 'success');
            renderGamesTab();
          }
        });

        document.getElementById('cancel-edit-btn').addEventListener('click', () => {
          formContainer.style.display = 'none';
        });
      }

      function deleteGame(gameId) {
        if (confirm('Удалить игру?')) {
          let games = getGames();
          games = games.filter(g => g.id !== gameId);
          saveGames(games);
          showToast('Игра удалена', 'info');
          renderGamesTab();
        }
      }

      // ========== ВКЛАДКА "ПОЛЬЗОВАТЕЛИ" (с редактированием баллов) ==========
      function renderUsersTab() {
        const users = getUsers();
        const optionsHTML = DEPARTMENTS.map(dept => `<option value="${dept}">${dept}</option>`).join('');

        let html = `
          <h3>Пользователи (${users.length})</h3>
          <table class="admin-users-table">
            <thead>
              <tr>
                <th>Логин</th>
                <th>Роль</th>
                <th>Баллы</th>
                <th>Отдел</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody>
              ${users.map(user => `
                <tr>
                  <td>${user.username}</td>
                  <td>
                    <select class="role-select" data-user-id="${user.id}">
                      <option value="user" ${user.role === 'user' ? 'selected' : ''}>user</option>
                      <option value="moderator" ${user.role === 'moderator' ? 'selected' : ''}>moderator</option>
                      <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>admin</option>
                    </select>
                  </td>
                  <td>
                    <input type="number" class="points-input" data-user-id="${user.id}" value="${user.points}" min="0" style="width:80px;">
                  </td>
                  <td>
                    <select class="dept-select" data-user-id="${user.id}">
                      <option value="">-- Не указан --</option>
                      ${optionsHTML}
                    </select>
                  </td>
                  <td>
                    <button class="btn-save-role" data-user-id="${user.id}">Сохранить</button>
                    ${user.username !== 'admin' && user.id != currentUser.id ? 
                      `<button class="btn-delete-user" data-user-id="${user.id}" style="margin-left:0.5rem;">🗑️</button>` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        contentArea.innerHTML = html;

        // Устанавливаем текущие значения отделов
        users.forEach(user => {
          const select = document.querySelector(`.dept-select[data-user-id="${user.id}"]`);
          if (select) select.value = user.department || '';
        });

        // Обработчики сохранения (роль + баллы + отдел)
        document.querySelectorAll('.btn-save-role').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const userId = e.target.dataset.userId;
            const roleSelect = document.querySelector(`.role-select[data-user-id="${userId}"]`);
            const pointsInput = document.querySelector(`.points-input[data-user-id="${userId}"]`);
            const deptSelect = document.querySelector(`.dept-select[data-user-id="${userId}"]`);

            const newRole = roleSelect.value;
            const newPoints = parseInt(pointsInput.value, 10) || 0;
            const newDept = deptSelect.value;

            const users = getUsers();
            const user = users.find(u => u.id == userId);
            if (user) {
              user.role = newRole;
              user.points = Math.max(0, newPoints); // не меньше 0
              user.department = newDept;
              saveUsers(users);

              // Обновляем сессию, если это текущий пользователь
              if (currentUser && currentUser.id == userId) {
                setCurrentUser(user);
              }

              showToast(`Пользователь ${user.username} обновлён`, 'success');
              renderUsersTab();
            }
          });
        });

        // Обработчики удаления в корзину
        document.querySelectorAll('.btn-delete-user').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const userId = e.target.dataset.userId;
            if (confirm('Переместить пользователя в корзину?')) {
              if (moveUserToTrash(userId)) {
                showToast('Пользователь перемещён в корзину', 'info');
                renderUsersTab();
              } else {
                showToast('Ошибка при удалении', 'error');
              }
            }
          });
        });
      }

      // ========== ВКЛАДКА "КОРЗИНА" ==========
      function renderTrashTab() {
        const deletedUsers = getDeletedUsers();
        if (deletedUsers.length === 0) {
          contentArea.innerHTML = '<h3>Корзина пуста</h3>';
          return;
        }

        let html = `
          <h3>Корзина (удалённые пользователи: ${deletedUsers.length})</h3>
          <table class="admin-users-table">
            <thead>
              <tr>
                <th>Логин</th>
                <th>Роль</th>
                <th>Баллы</th>
                <th>Отдел</th>
                <th>Восстановить</th>
                <th>Удалить навсегда</th>
              </tr>
            </thead>
            <tbody>
              ${deletedUsers.map(user => `
                <tr>
                  <td>${user.username}</td>
                  <td>${user.role}</td>
                  <td>${user.points}</td>
                  <td>${user.department || '—'}</td>
                  <td><button class="btn-restore-user" data-user-id="${user.id}">🔄</button></td>
                  <td><button class="btn-perm-delete-user" data-user-id="${user.id}">❌</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        contentArea.innerHTML = html;

        document.querySelectorAll('.btn-restore-user').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const userId = e.target.dataset.userId;
            if (confirm('Восстановить пользователя?')) {
              if (restoreUserFromTrash(userId)) {
                showToast('Пользователь восстановлен', 'success');
                renderTrashTab();
              } else {
                showToast('Ошибка восстановления', 'error');
              }
            }
          });
        });

        document.querySelectorAll('.btn-perm-delete-user').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const userId = e.target.dataset.userId;
            if (confirm('Удалить пользователя навсегда? Это действие нельзя отменить.')) {
              permanentlyDeleteUser(userId);
              showToast('Пользователь удалён окончательно', 'info');
              renderTrashTab();
            }
          });
        });
      }

      renderTab('games');
    });
  </script>
</body>
</html>
