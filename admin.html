<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .feedback-list { margin-top: 1rem; }
    .feedback-item { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .feedback-item-header { margin-bottom: 0.5rem; }
    .feedback-item-header small { color: #999; }
    .btn-gift { background: #9b59b6; color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-left: 0.3rem; }
    .btn-gift:hover { background: #8e44ad; }
    .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0.1rem; }
    .mass-notif-form { background: #f9f9fb; padding: 1.5rem; border-radius: 12px; max-width: 600px; margin-top: 1rem; }
    .mass-notif-form select, .mass-notif-form input, .mass-notif-form textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    .progress-bar { width: 100%; background: #eee; border-radius: 8px; height: 20px; margin: 1rem 0; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #27ae60; width: 0%; transition: width 0.2s; }
    .dept-list, .announcements-list, .achievements-list { list-style: none; padding: 0; }
    .dept-list li, .announcements-list li, .achievements-list li { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #eee; }
    .dept-list li button, .announcements-list li button, .achievements-list li button { margin-left: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .stat-card { background: #f9f9fb; border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-card .stat-value { font-size: 2rem; font-weight: bold; }
    .export-btn { margin-top: 1rem; }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link active">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container" id="admin-container"></div>
  </main>

  <!-- Модальные окна (локоины, товар, подарок) -->
  <div class="modal-overlay" id="lokoin-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="lokoin-modal-close">&times;</span>
      <h3>Изменить баланс локоинов</h3>
      <div class="form-group"><label for="lokoin-amount">Количество</label><input type="number" id="lokoin-amount" step="1"></div>
      <div class="form-group"><label for="lokoin-comment">Комментарий</label><input type="text" id="lokoin-comment"></div>
      <button class="btn" id="lokoin-submit">Применить</button>
      <p id="lokoin-message" class="auth-message"></p>
    </div>
  </div>

  <div class="modal-overlay" id="shop-item-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="shop-item-modal-close">&times;</span>
      <h3>Редактировать товар</h3>
      <div id="shop-item-id-display"></div>
      <div class="form-group"><label for="shop-item-title">Название</label><input type="text" id="shop-item-title" required></div>
      <div class="form-group"><label for="shop-item-desc">Описание</label><textarea id="shop-item-desc" rows="3"></textarea></div>
      <div class="form-group"><label for="shop-item-category">Категория</label><input type="text" id="shop-item-category"></div>
      <div class="form-group"><label for="shop-item-price">Цена</label><input type="number" id="shop-item-price" min="1" required></div>
      <div class="form-group"><label for="shop-item-icon">Иконка</label><input type="text" id="shop-item-icon" value="🛒"></div>
      <div class="form-group"><label for="shop-item-effect">Эффект</label><input type="text" id="shop-item-effect"></div>
      <div class="form-group"><label for="shop-item-unique">Уникальный</label><select id="shop-item-unique"><option value="true">Да</option><option value="false">Нет</option></select></div>
      <button class="btn" id="shop-item-save">Сохранить</button>
      <p id="shop-item-message" class="auth-message"></p>
    </div>
  </div>

  <div class="modal-overlay" id="gift-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="gift-modal-close">&times;</span>
      <h3>Подарить товар</h3>
      <p id="gift-user-name"></p>
      <div class="form-group"><label for="gift-item-select">Товар</label><select id="gift-item-select"></select></div>
      <button class="btn" id="gift-submit">Подарить</button>
      <p id="gift-message" class="auth-message"></p>
    </div>
  </div>

  <!-- Модальное окно для достижений -->
  <div class="modal-overlay" id="achievement-modal" style="display:none;">
    <div class="modal" style="max-width:500px;">
      <span class="modal-close" id="achievement-modal-close">&times;</span>
      <h3 id="achievement-modal-title">Достижение</h3>
      <div class="form-group">
        <label for="ach-id">ID (латиница, без пробелов)</label>
        <input type="text" id="ach-id" required>
      </div>
      <div class="form-group">
        <label for="ach-name">Название</label>
        <input type="text" id="ach-name" required>
      </div>
      <div class="form-group">
        <label for="ach-desc">Описание</label>
        <input type="text" id="ach-desc">
      </div>
      <div class="form-group">
        <label for="ach-icon">Иконка (emoji)</label>
        <input type="text" id="ach-icon" value="🏆">
      </div>
      <div class="form-group">
        <label for="ach-hidden">Скрытое?</label>
        <select id="ach-hidden">
          <option value="false">Нет</option>
          <option value="true">Да</option>
        </select>
      </div>
      <button class="btn" id="ach-save-btn">Сохранить</button>
      <p id="ach-message" class="auth-message"></p>
    </div>
  </div>

  <!-- Модальное окно новости -->
  <div class="modal-overlay" id="news-modal" style="display:none;">
    <div class="modal" style="max-width:600px;">
      <span class="modal-close" id="news-modal-close">&times;</span>
      <h3 id="news-modal-title">Новость</h3>
      <div class="form-group"><label for="news-title">Заголовок</label><input type="text" id="news-title" required></div>
      <div class="form-group"><label for="news-body">Текст</label><textarea id="news-body" rows="4"></textarea></div>
      <div class="form-group"><label for="news-icon">Иконка (emoji)</label><input type="text" id="news-icon" placeholder="📢"></div>
      <div class="form-group"><label for="news-image-url">Ссылка на изображение</label><input type="text" id="news-image-url" placeholder="img/photo.jpg или https://..."></div>
      <div class="form-group"><label for="news-video-url">Ссылка на видео (YouTube embed URL)</label><input type="text" id="news-video-url" placeholder="https://www.youtube.com/embed/..."></div>
      <div class="form-group"><label for="news-link">Кнопка «Подробнее» (URL)</label><input type="text" id="news-link"></div>
      <div class="form-group"><label for="news-publish-at">Опубликовать с</label><input type="datetime-local" id="news-publish-at"></div>
      <div class="form-group"><label for="news-expire-at">Скрыть после (опционально)</label><input type="datetime-local" id="news-expire-at"></div>
      <div class="form-group"><label><input type="checkbox" id="news-notify-all"> Оповестить всех пользователей</label></div>
      <button class="btn" id="news-save-btn">Сохранить</button>
      <p id="news-message" class="auth-message"></p>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feedback.js"></script>

  <script>
    // Глобальный кэш отделов
    let departmentsCache = [];

    async function loadDepartments() {
      try {
        const snap = await db.collection('departments').orderBy('name').get();
        departmentsCache = [];
        snap.forEach(doc => departmentsCache.push({ id: doc.id, name: doc.data().name }));
        if (departmentsCache.length === 0) {
          const defaults = [
            'РБ (Физические лица)',
            'МСБ (Юридические лица)',
            'ТМ (Телемаркетинг)',
            'Депозиты (группа привлечения некредитных продуктов)',
            'ОКК (отдел контроля качества)',
            'ООБП (отдел оптимизации бизнес процессов)',
            'Боссы (начальники и руководители начальников)',
            'Заблудшие души КЦ (в каком отделе КЦ я работаю?)'
          ];
          for (const name of defaults) {
            await db.collection('departments').add({ name });
          }
          return loadDepartments();
        }
      } catch (e) {
        console.warn('Не удалось загрузить отделы, используется резервный список:', e);
        departmentsCache = [
          { id: 'fb1', name: 'РБ (Физические лица)' },
          { id: 'fb2', name: 'МСБ (Юридические лица)' },
          { id: 'fb3', name: 'ТМ (Телемаркетинг)' },
          { id: 'fb4', name: 'Депозиты (группа привлечения некредитных продуктов)' },
          { id: 'fb5', name: 'ОКК (отдел контроля качества)' },
          { id: 'fb6', name: 'ООБП (отдел оптимизации бизнес процессов)' },
          { id: 'fb7', name: 'Боссы (начальники и руководители начальников)' },
          { id: 'fb8', name: 'Заблудшие души КЦ (в каком отделе КЦ я работаю?)' }
        ];
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('admin-container');

      auth.onAuthStateChanged(async (firebaseUser) => {
        if (!firebaseUser) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
        try {
          const doc = await db.collection('users').doc(firebaseUser.uid).get();
          if (!doc.exists || doc.data().role !== 'admin') {
            container.innerHTML = '<p>Доступ запрещён. Требуются права администратора.</p>';
            return;
          }
          await loadDepartments();
          renderAdminPanel();
        } catch (err) {
          console.error('Ошибка загрузки админки:', err);
          container.innerHTML = `<p>Ошибка: ${err.message}. Попробуйте обновить страницу.</p>`;
        }
      });

      function renderAdminPanel() {
        container.innerHTML = `
          <h2>Административная панель</h2>
          <div class="admin-tabs">
            <button class="admin-tab active" data-tab="games">Игры</button>
            <button class="admin-tab" data-tab="users">Пользователи</button>
            <button class="admin-tab" data-tab="feedback">Обращения</button>
            <button class="admin-tab" data-tab="shop">Магазин</button>
            <button class="admin-tab" data-tab="notifications">Уведомления</button>
            <button class="admin-tab" data-tab="departments">Отделы</button>
            <button class="admin-tab" data-tab="achievements">Достижения</button>
            <button class="admin-tab" data-tab="stats">Статистика</button>
            <button class="admin-tab" data-tab="news">Новости</button>
            <button class="admin-tab" data-tab="export">Экспорт</button>
          </div>
          <div id="admin-tab-content" class="admin-tab-content"></div>
        `;
        const tabs = document.querySelectorAll('.admin-tab');
        const content = document.getElementById('admin-tab-content');
        tabs.forEach(t => t.addEventListener('click', () => {
          tabs.forEach(b => b.classList.remove('active'));
          t.classList.add('active');
          loadTab(t.dataset.tab);
        }));
        loadTab('games');
        function loadTab(tab) {
          switch (tab) {
            case 'games': renderGamesTab(); break;
            case 'users': renderUsersTab(); break;
            case 'feedback': renderFeedbackTab(); break;
            case 'shop': renderShopTab(); break;
            case 'notifications': renderNotificationsTab(); break;
            case 'departments': renderDepartmentsTab(); break;
            case 'achievements': renderAchievementsTab(); break;
            case 'stats': renderStatsTab(); break;
            case 'news': renderNewsTab(); break;
            case 'export': renderExportTab(); break;
          }
        }
      }

      // ----- Игры (Firestore) -----
      async function renderGamesTab() {
        const tabContent = document.getElementById('admin-tab-content');
        tabContent.innerHTML = '<p>Загрузка игр...</p>';
        try {
          const snap = await db.collection('games').get();
          const games = [];
          snap.forEach(doc => games.push({ id: doc.id, ...doc.data() }));
          let html = '<h3>Управление играми</h3>';
          if (games.length === 0) {
            html += '<p>Список игр пуст.</p>';
          } else {
            html += '<ul>';
            games.forEach(game => {
              html += `<li style="display:flex; align-items:center; gap:1rem; margin-bottom:0.5rem;">
                <span>${game.icon || '🎮'} <strong>${game.title}</strong> (${game.id})</span>
                <button class="btn btn-small btn-danger remove-game-btn" data-game-id="${game.id}">Удалить</button>
              </li>`;
            });
            html += '</ul>';
          }
          html += `
            <div class="admin-add-game" style="margin-top:1.5rem;">
              <h4>Добавить / Редактировать игру</h4>
              <form id="add-game-form">
                <div class="form-group"><label>ID игры (латиница, без пробелов)</label><input type="text" id="game-id" placeholder="clicker" required></div>
                <div class="form-group"><label>Название</label><input type="text" id="game-title" required></div>
                <div class="form-group"><label>Описание</label><input type="text" id="game-desc" required></div>
                <div class="form-group"><label>Иконка (emoji)</label><input type="text" id="game-icon" value="🎮"></div>
                <div class="form-group"><label>URL игры</label><input type="text" id="game-url" placeholder="games/clicker.html" required></div>
                <button type="submit" class="btn" id="game-save-btn">Сохранить</button>
              </form>
              <p id="game-form-message" class="auth-message"></p>
            </div>
          `;
          tabContent.innerHTML = html;
          document.querySelectorAll('.remove-game-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              if (confirm('Удалить игру?')) {
                await db.collection('games').doc(e.target.dataset.gameId).delete();
                showToast('Игра удалена', 'success');
                renderGamesTab();
              }
            });
          });
          document.getElementById('add-game-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('game-id').value.trim().toLowerCase();
            const title = document.getElementById('game-title').value.trim();
            const desc = document.getElementById('game-desc').value.trim();
            const icon = document.getElementById('game-icon').value.trim() || '🎮';
            const url = document.getElementById('game-url').value.trim();
            if (!id || !title || !desc || !url) { showToast('Заполните все поля', 'error'); return; }
            try {
              await db.collection('games').doc(id).set({ title, description: desc, icon, url });
              showToast('Игра сохранена', 'success');
              renderGamesTab();
            } catch (err) { showToast('Ошибка: ' + err.message, 'error'); }
          });
          document.querySelectorAll('li span').forEach(span => {
            span.style.cursor = 'pointer';
            span.addEventListener('click', () => {
              const gameId = span.parentElement.querySelector('.remove-game-btn').dataset.gameId;
              const game = games.find(g => g.id === gameId);
              if (game) {
                document.getElementById('game-id').value = game.id;
                document.getElementById('game-title').value = game.title;
                document.getElementById('game-desc').value = game.description || '';
                document.getElementById('game-icon').value = game.icon || '🎮';
                document.getElementById('game-url').value = game.url || '';
              }
            });
          });
        } catch (err) { tabContent.innerHTML = '<p>Ошибка загрузки игр.</p>'; console.error(err); }
      }

      // ----- Пользователи (Firestore) -----
      async function renderUsersTab() {
        const tabContent = document.getElementById('admin-tab-content');
        tabContent.innerHTML = '<p>Загрузка пользователей...</p>';
        try {
          const snapshot = await db.collection('users').get();
          const users = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            users.push({
              uid: doc.id,
              username: data.username || 'Без имени',
              email: data.email || '',
              department: data.department || '',
              points: data.points || 0,
              lokoin_balance: data.lokoin_balance || 0,
              role: data.role || 'user',
              achievements: data.achievements || [],
              disabled: data.disabled || false
            });
          });
          users.sort((a, b) => b.points - a.points);
          let html = '<h3>Пользователи</h3><table class="admin-users-table"><thead><tr><th>Игрок</th><th>Email</th><th>Отдел</th><th>Баллы</th><th>Локоины</th><th>Роль</th><th>Статус</th><th>Достижения</th><th>Действия</th></tr></thead><tbody>';
          users.forEach(user => {
            const avatarHtml = (typeof renderAvatarDiv === 'function') ? renderAvatarDiv(user) : `<div class="avatar-circle" style="background-color: ${getColorFromUid(user.uid)}">${getInitials(user.username)}</div>`;
            html += `
              <tr data-user-id="${user.uid}">
                <td class="player-cell">${avatarHtml}<span>${user.username}</span></td>
                <td>${user.email}</td>
                <td class="editable" data-field="department">${user.department || '—'}</td>
                <td class="editable" data-field="points">${user.points}</td>
                <td><span class="lokoin-display">${user.lokoin_balance}</span></td>
                <td class="editable" data-field="role">${user.role}</td>
                <td>${user.disabled ? '🔒 Заблокирован' : '✅ Активен'}</td>
                <td>${user.achievements.length}</td>
                <td>
                  <button class="btn btn-small edit-user-btn">✏️</button>
                  <button class="btn btn-small save-user-btn" style="display:none;">💾</button>
                  <button class="btn btn-small cancel-user-btn" style="display:none;">❌</button>
                  <button class="btn btn-small adjust-lokoin-btn" title="Изменить локоины">💰</button>
                  <button class="btn btn-small btn-gift gift-item-btn" title="Подарить товар">🎁</button>
                  <button class="btn btn-small toggle-block-btn" title="Заблокировать/Разблокировать">🔓</button>
                </td>
              </tr>
            `;
          });
          html += '</tbody></table>';
          tabContent.innerHTML = html;
          attachUserEditHandlers(users);
          attachLokoinHandlers(users);
          attachGiftHandlers(users);
          attachBlockHandlers(users);
        } catch (err) { console.error('Ошибка загрузки пользователей:', err); tabContent.innerHTML = '<p>Не удалось загрузить список пользователей.</p>'; }
      }

      function attachUserEditHandlers(users) {
        const rows = document.querySelectorAll('.admin-users-table tbody tr');
        rows.forEach((row, index) => {
          const user = users[index];
          const editBtn = row.querySelector('.edit-user-btn');
          const saveBtn = row.querySelector('.save-user-btn');
          const cancelBtn = row.querySelector('.cancel-user-btn');
          const cells = row.querySelectorAll('.editable');
          cells.forEach(cell => cell.dataset.original = cell.innerText);
          editBtn.addEventListener('click', () => {
            cells.forEach(cell => {
              const field = cell.dataset.field;
              const val = cell.innerText;
              if (field === 'role') cell.innerHTML = `<select class="edit-role"><option value="user" ${val==='user'?'selected':''}>user</option><option value="admin" ${val==='admin'?'selected':''}>admin</option></select>`;
              else if (field === 'department') cell.innerHTML = `<select class="edit-department">${departmentsCache.map(d => `<option value="${d.name}" ${val===d.name?'selected':''}>${d.name}</option>`).join('')}</select>`;
              else if (field === 'points') cell.innerHTML = `<input type="number" class="edit-points" value="${val}" min="0">`;
            });
            editBtn.style.display = 'none'; saveBtn.style.display = 'inline-block'; cancelBtn.style.display = 'inline-block';
          });
          saveBtn.addEventListener('click', async () => {
            const newData = {};
            cells.forEach(cell => {
              const field = cell.dataset.field;
              if (field === 'role') newData.role = cell.querySelector('select').value;
              else if (field === 'department') newData.department = cell.querySelector('select').value;
              else if (field === 'points') newData.points = parseInt(cell.querySelector('input').value, 10) || 0;
            });
            try {
              await db.collection('users').doc(user.uid).update(newData);
              showToast('Данные обновлены', 'success');
              Object.assign(user, newData);
              cells.forEach(cell => { cell.innerText = newData[cell.dataset.field]; cell.dataset.original = cell.innerText; });
              editBtn.style.display = 'inline-block'; saveBtn.style.display = 'none'; cancelBtn.style.display = 'none';
            } catch (err) { showToast('Ошибка: ' + err.message, 'error'); }
          });
          cancelBtn.addEventListener('click', () => {
            cells.forEach(cell => cell.innerText = cell.dataset.original);
            editBtn.style.display = 'inline-block'; saveBtn.style.display = 'none'; cancelBtn.style.display = 'none';
          });
        });
      }

      function attachLokoinHandlers(users) {
        const rows = document.querySelectorAll('.admin-users-table tbody tr');
        rows.forEach((row, index) => {
          const user = users[index];
          const btn = row.querySelector('.adjust-lokoin-btn');
          const display = row.querySelector('.lokoin-display');
          if (!btn || !display) return;
          btn.addEventListener('click', () => openLokoinModal(user, display));
        });
      }

      let currentLokoinUser = null, currentLokoinDisplay = null;
      function openLokoinModal(user, displayElement) {
        currentLokoinUser = user; currentLokoinDisplay = displayElement;
        document.getElementById('lokoin-amount').value = ''; document.getElementById('lokoin-comment').value = '';
        document.getElementById('lokoin-message').textContent = ''; document.getElementById('lokoin-modal').style.display = 'flex';
      }
      document.getElementById('lokoin-modal-close').addEventListener('click', () => { document.getElementById('lokoin-modal').style.display = 'none'; });
      document.getElementById('lokoin-submit').addEventListener('click', async () => {
        const amountStr = document.getElementById('lokoin-amount').value.trim();
        const comment = document.getElementById('lokoin-comment').value.trim();
        const amount = parseInt(amountStr, 10);
        if (isNaN(amount) || amount === 0) { document.getElementById('lokoin-message').textContent = 'Введите число (не ноль).'; return; }
        try {
          const userRef = db.collection('users').doc(currentLokoinUser.uid);
          const doc = await userRef.get();
          if (!doc.exists) throw new Error('Пользователь не найден');
          const oldBalance = doc.data().lokoin_balance || 0;
          const newBalance = oldBalance + amount;
          if (newBalance < 0) { document.getElementById('lokoin-message').textContent = 'Недостаточно локоинов.'; return; }
          await userRef.update({ lokoin_balance: newBalance });
          currentLokoinUser.lokoin_balance = newBalance; currentLokoinDisplay.textContent = newBalance;
          document.getElementById('lokoin-modal').style.display = 'none';
          showToast('Баланс локоинов обновлён', 'success');
          if (typeof addLokoinNotification === 'function') addLokoinNotification(currentLokoinUser.uid, amount, comment);
        } catch (err) { document.getElementById('lokoin-message').textContent = 'Ошибка: ' + err.message; }
      });

      function attachGiftHandlers(users) {
        const rows = document.querySelectorAll('.admin-users-table tbody tr');
        rows.forEach((row, index) => {
          const user = users[index];
          const btn = row.querySelector('.gift-item-btn');
          if (!btn) return;
          btn.addEventListener('click', () => openGiftModal(user));
        });
      }
      let currentGiftUser = null;
      async function openGiftModal(user) {
        currentGiftUser = user;
        document.getElementById('gift-user-name').textContent = `Пользователь: ${user.username}`;
        document.getElementById('gift-message').textContent = '';
        const select = document.getElementById('gift-item-select');
        select.innerHTML = '<option value="">Загрузка...</option>';
        document.getElementById('gift-modal').style.display = 'flex';
        try {
          const snap = await db.collection('shopItems').get();
          const items = [];
          snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
          if (items.length === 0) { select.innerHTML = '<option value="">Нет товаров</option>'; return; }
          select.innerHTML = items.map(item => `<option value="${item.id}">${item.icon || '🛒'} ${item.title} (${item.price} лок.)</option>`).join('');
        } catch (err) { console.error(err); select.innerHTML = '<option value="">Ошибка загрузки</option>'; }
      }
      document.getElementById('gift-modal-close').addEventListener('click', () => { document.getElementById('gift-modal').style.display = 'none'; });
      document.getElementById('gift-submit').addEventListener('click', async () => {
        const select = document.getElementById('gift-item-select');
        const itemId = select.value;
        if (!itemId || !currentGiftUser) return;
        try {
          await db.collection('users').doc(currentGiftUser.uid).update({ purchasedItems: firebase.firestore.FieldValue.arrayUnion(itemId) });
          if (typeof addNotification === 'function') {
            const itemName = select.options[select.selectedIndex].text;
            await addNotification(currentGiftUser.uid, `🎁 Вам подарен товар: ${itemName}`, 'gift', 'shop.html');
          }
          showToast('Товар подарен!', 'success');
          document.getElementById('gift-modal').style.display = 'none';
        } catch (err) { document.getElementById('gift-message').textContent = 'Ошибка: ' + err.message; }
      });

      function attachBlockHandlers(users) {
        const rows = document.querySelectorAll('.admin-users-table tbody tr');
        rows.forEach((row, index) => {
          const user = users[index];
          const btn = row.querySelector('.toggle-block-btn');
          if (!btn) return;
          btn.textContent = user.disabled ? '🔓' : '🔒';
          btn.addEventListener('click', async () => {
            const newDisabled = !user.disabled;
            try {
              await db.collection('users').doc(user.uid).update({ disabled: newDisabled });
              user.disabled = newDisabled;
              btn.textContent = newDisabled ? '🔓' : '🔒';
              row.querySelector('td:nth-child(7)').textContent = newDisabled ? '🔒 Заблокирован' : '✅ Активен';
              showToast(newDisabled ? 'Пользователь заблокирован' : 'Пользователь разблокирован', 'success');
            } catch (err) { showToast('Ошибка: ' + err.message, 'error'); }
          });
        });
      }
