<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .feedback-list { margin-top: 1rem; }
    .feedback-item { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .feedback-item-header { margin-bottom: 0.5rem; }
    .feedback-item-header small { color: #999; }
    .btn-gift { background: #9b59b6; color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-left: 0.3rem; }
    .btn-gift:hover { background: #8e44ad; }
    .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0.1rem; }
    .mass-notif-form { background: #f9f9fb; padding: 1.5rem; border-radius: 12px; max-width: 600px; margin-top: 1rem; }
    .mass-notif-form select, .mass-notif-form input, .mass-notif-form textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    .progress-bar { width: 100%; background: #eee; border-radius: 8px; height: 20px; margin: 1rem 0; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #27ae60; width: 0%; transition: width 0.2s; }
    .dept-list, .announcements-list, .awards-list, .requests-list { list-style: none; padding: 0; }
    .dept-list li, .announcements-list li, .awards-list li, .requests-list li { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #eee; }
    .dept-list li button, .announcements-list li button, .awards-list li button, .requests-list li button { margin-left: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .stat-card { background: #f9f9fb; border-radius: 12px; padding: 1rem; text-align: center; }
    .stat-card .stat-value { font-size: 2rem; font-weight: bold; }
    .export-btn { margin-top: 1rem; }
    .award-icon-preview { width: 32px; height: 32px; vertical-align: middle; margin-right: 0.5rem; }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link active">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container" id="admin-container"></div>
  </main>

  <!-- Модальные окна (локоины, товар, подарок) -->
  <div class="modal-overlay" id="lokoin-modal" style="display:none;">
    <div class="modal"><span class="modal-close" id="lokoin-modal-close">&times;</span><h3>Изменить баланс локоинов</h3><div class="form-group"><label for="lokoin-amount">Количество</label><input type="number" id="lokoin-amount" step="1"></div><div class="form-group"><label for="lokoin-comment">Комментарий</label><input type="text" id="lokoin-comment"></div><button class="btn" id="lokoin-submit">Применить</button><p id="lokoin-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="shop-item-modal" style="display:none;">
    <div class="modal" style="max-width:550px;"><span class="modal-close" id="shop-item-modal-close">&times;</span><h3>Редактировать товар</h3><div id="shop-item-id-display"></div><div class="form-group"><label>Название *</label><input type="text" id="shop-item-title" required></div><div class="form-group"><label>Описание</label><textarea id="shop-item-desc" rows="2"></textarea></div><div class="form-group"><label>Категория</label><select id="shop-item-category"><option value="Кастомизация">Кастомизация</option><option value="Реакции">Реакции</option><option value="Игровые бонусы">Игровые бонусы</option><option value="Рабочие плюшки">Рабочие плюшки</option><option value="Особые товары">Особые товары</option></select></div><div class="form-group"><label>Цена *</label><input type="number" id="shop-item-price" min="1" required></div><div class="form-group"><label>Иконка</label><input type="text" id="shop-item-icon" value="🛒"></div><div class="form-group"><label>Эффект</label><input type="text" id="shop-item-effect"></div><div class="form-group"><label>Длительность (ч, 0=бессрочно)</label><input type="number" id="shop-item-duration" value="0" min="0"></div><div class="form-group"><label>Уникальный</label><select id="shop-item-unique"><option value="true">Да</option><option value="false">Нет</option></select></div><div class="form-group"><label>Уведомить админа</label><select id="shop-item-notify-admin"><option value="false">Нет</option><option value="true">Да</option></select></div><div class="form-group"><label>Количество (пусто=∞)</label><input type="number" id="shop-item-stock"></div><button class="btn" id="shop-item-save">Сохранить</button><p id="shop-item-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="gift-modal" style="display:none;">
    <div class="modal"><span class="modal-close" id="gift-modal-close">&times;</span><h3>Подарить товар</h3><p id="gift-user-name"></p><div class="form-group"><label for="gift-item-select">Товар</label><select id="gift-item-select"></select></div><button class="btn" id="gift-submit">Подарить</button><p id="gift-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="news-modal" style="display:none;">
    <div class="modal" style="max-width:600px;"><span class="modal-close" id="news-modal-close">&times;</span><h3 id="news-modal-title">Новость</h3><div class="form-group"><label for="news-title">Заголовок</label><input type="text" id="news-title" required></div><div class="form-group"><label for="news-body">Текст</label><textarea id="news-body" rows="4"></textarea></div><div class="form-group"><label for="news-icon">Иконка</label><input type="text" id="news-icon" placeholder="📢"></div><div class="form-group"><label for="news-image-url">Изображение URL</label><input type="text" id="news-image-url"></div><div class="form-group"><label for="news-video-url">Видео URL</label><input type="text" id="news-video-url"></div><div class="form-group"><label for="news-link">Ссылка</label><input type="text" id="news-link"></div><div class="form-group"><label for="news-publish-at">Опубликовать с</label><input type="datetime-local" id="news-publish-at"></div><div class="form-group"><label for="news-expire-at">Скрыть после</label><input type="datetime-local" id="news-expire-at"></div><div class="form-group"><label><input type="checkbox" id="news-notify-all"> Оповестить всех</label></div><button class="btn" id="news-save-btn">Сохранить</button><p id="news-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="award-modal" style="display:none;">
    <div class="modal" style="max-width:500px;"><span class="modal-close" id="award-modal-close">&times;</span><h3 id="award-modal-title">Награда</h3><div class="form-group"><label for="award-id">ID</label><input type="text" id="award-id" required></div><div class="form-group"><label for="award-name">Название</label><input type="text" id="award-name" required></div><div class="form-group"><label for="award-desc">Описание</label><textarea id="award-desc" rows="2"></textarea></div><div class="form-group"><label for="award-icon-file">SVG файл</label><input type="text" id="award-icon-file" placeholder="gold-star.svg" required></div><div class="form-group"><label for="award-lokoin">Локоинов</label><input type="number" id="award-lokoin" value="0" min="0"></div><button class="btn" id="award-save-btn">Сохранить</button><p id="award-message" class="auth-message"></p></div>
  </div>

  <div class="modal-overlay" id="award-user-modal" style="display:none;">
    <div class="modal" style="max-width:450px;"><span class="modal-close" id="award-user-modal-close">&times;</span><h3>Выдать награду</h3><p id="award-user-name"></p><div class="form-group"><label for="award-select">Награда</label><select id="award-select"></select></div><div class="form-group"><label for="award-comment">Комментарий</label><textarea id="award-comment" rows="2"></textarea></div><button class="btn" id="award-user-submit">Выдать</button><p id="award-user-message" class="auth-message"></p></div>
  </div>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feedback.js"></script>

  <script>
    let departmentsCache = [];
    async function loadDepartments() { try { const s = await db.collection('departments').orderBy('name').get(); departmentsCache = []; s.forEach(d => departmentsCache.push({ id: d.id, name: d.data().name })); if (!departmentsCache.length) { const def = ['РБ','МСБ','ТМ','Депозиты','ОКК','ООБП','Боссы','Заблудшие души']; for (const n of def) await db.collection('departments').add({ name: n }); return loadDepartments(); } } catch (e) { departmentsCache = ['РБ','МСБ','ТМ','Депозиты','ОКК','ООБП','Боссы','Заблудшие души'].map((n,i)=>({id:'fb'+i,name:n})); } }

    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('admin-container');
      auth.onAuthStateChanged(async fbUser => {
        if (!fbUser) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
        try { const d = await db.collection('users').doc(fbUser.uid).get(); if (!d.exists || d.data().role !== 'admin') { container.innerHTML = '<p>Доступ запрещён.</p>'; return; } await loadDepartments(); renderAdminPanel(); }
        catch (err) { container.innerHTML = `<p>Ошибка: ${err.message}</p>`; }
      });

      function renderAdminPanel() {
        container.innerHTML = `<h2>Административная панель</h2><div class="admin-tabs"><button class="admin-tab active" data-tab="games">Игры</button><button class="admin-tab" data-tab="users">Пользователи</button><button class="admin-tab" data-tab="requests">Заявки</button><button class="admin-tab" data-tab="feedback">Обращения</button><button class="admin-tab" data-tab="shop">Магазин</button><button class="admin-tab" data-tab="notifications">Уведомления</button><button class="admin-tab" data-tab="departments">Отделы</button><button class="admin-tab" data-tab="awards">Награды</button><button class="admin-tab" data-tab="events">🎪 Ивенты</button><button class="admin-tab" data-tab="stats">Статистика</button><button class="admin-tab" data-tab="news">Новости</button><button class="admin-tab" data-tab="export">Экспорт</button></div><div id="admin-tab-content" class="admin-tab-content"></div>`;
        const tabs = document.querySelectorAll('.admin-tab'), content = document.getElementById('admin-tab-content');
        tabs.forEach(t => t.addEventListener('click', () => { tabs.forEach(b => b.classList.remove('active')); t.classList.add('active'); loadTab(t.dataset.tab); }));
        loadTab('games');
        function loadTab(t) { switch(t) { case 'games': renderGamesTab(); break; case 'users': renderUsersTab(); break; case 'requests': renderRequestsTab(); break; case 'feedback': renderFeedbackTab(); break; case 'shop': renderShopTab(); break; case 'notifications': renderNotificationsTab(); break; case 'departments': renderDepartmentsTab(); break; case 'awards': renderAwardsTab(); break; case 'events': window.location.href = 'events-admin.html'; break; case 'stats': renderStatsTab(); break; case 'news': renderNewsTab(); break; case 'export': renderExportTab(); break; } }
      }

      // ----- Заявки -----
      async function renderRequestsTab() {
        const tc = document.getElementById('admin-tab-content'); tc.innerHTML = '<p>Загрузка...</p>';
        try {
          const snap = await db.collection('purchaseRequests').orderBy('createdAt', 'desc').get();
          const requests = []; snap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
          let html = `<h3>📋 Заявки на реализацию (${requests.length})</h3>`;
          if (!requests.length) { html += '<p>Нет заявок.</p>'; } else {
            html += '<table class="admin-users-table"><thead><tr><th>Пользователь</th><th>Отдел</th><th>Товар</th><th>Цена</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
            requests.forEach(r => {
              const statusText = r.status === 'new' ? '🆕 Новое' : r.status === 'progress' ? '🔄 В работе' : '✅ Выполнено';
              const date = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleString('ru-RU') : '';
              html += `<tr><td>${r.username}</td><td>${r.department || '—'}</td><td>${r.itemTitle}</td><td>${r.itemPrice} лок.</td><td>${date}</td><td>${statusText}</td><td><select class="request-status" data-req-id="${r.id}"><option value="new" ${r.status==='new'?'selected':''}>Новое</option><option value="progress" ${r.status==='progress'?'selected':''}>В работе</option><option value="done" ${r.status==='done'?'selected':''}>Выполнено</option></select></td></tr>`;
            });
            html += '</tbody></table>';
          }
          tc.innerHTML = html;
          document.querySelectorAll('.request-status').forEach(sel => sel.addEventListener('change', async function() {
            await db.collection('purchaseRequests').doc(this.dataset.reqId).update({ status: this.value });
            showToast('Статус обновлён', 'success');
          }));
        } catch (e) { tc.innerHTML = '<p>Ошибка.</p>'; }
      }

      // ----- Игры -----
      async function renderGamesTab() { const tc=document.getElementById('admin-tab-content'); tc.innerHTML='<p>Загрузка...</p>'; try{ const s=await db.collection('games').get(); const g=[]; s.forEach(d=>g.push({id:d.id,...d.data()})); let h='<h3>Игры</h3>'+(g.length?'<ul>'+g.map(x=>`<li style="display:flex;align-items:center;gap:1rem;"><span>${x.icon||'🎮'} <strong>${x.title}</strong> (${x.id})</span><button class="btn btn-small btn-danger remove-game-btn" data-game-id="${x.id}">Удалить</button></li>`).join('')+'</ul>':'<p>Пусто.</p>'); h+='<div class="admin-add-game"><h4>Добавить</h4><form id="add-game-form"><div class="form-group"><label>ID</label><input type="text" id="game-id" required></div><div class="form-group"><label>Название</label><input type="text" id="game-title" required></div><div class="form-group"><label>Описание</label><input type="text" id="game-desc" required></div><div class="form-group"><label>Иконка</label><input type="text" id="game-icon" value="🎮"></div><div class="form-group"><label>URL</label><input type="text" id="game-url" required></div><button type="submit" class="btn">Сохранить</button></form></div>'; tc.innerHTML=h; document.querySelectorAll('.remove-game-btn').forEach(b=>b.addEventListener('click',async e=>{if(confirm('Удалить?')){await db.collection('games').doc(e.target.dataset.gameId).delete();showToast('Удалена','success');renderGamesTab();}})); document.getElementById('add-game-form').addEventListener('submit',async e=>{e.preventDefault();const id=document.getElementById('game-id').value.trim().toLowerCase(),title=document.getElementById('game-title').value.trim(),desc=document.getElementById('game-desc').value.trim(),icon=document.getElementById('game-icon').value.trim()||'🎮',url=document.getElementById('game-url').value.trim();if(!id||!title||!desc||!url){showToast('Заполните все поля','error');return;}await db.collection('games').doc(id).set({title,description:desc,icon,url});showToast('Сохранена','success');renderGamesTab();}); }catch(e){tc.innerHTML='<p>Ошибка.</p>';} }

      // ----- Пользователи -----
      async function renderUsersTab() { const tc=document.getElementById('admin-tab-content'); tc.innerHTML='<p>Загрузка...</p>'; try{ const s=await db.collection('users').get(); const u=[]; s.forEach(d=>{const x=d.data();u.push({uid:d.id,username:x.username||'Без имени',email:x.email||'',department:x.department||'',points:x.points||0,lokoin_balance:x.lokoin_balance||0,role:x.role||'user',achievements:x.achievements||[],disabled:x.disabled||false});}); u.sort((a,b)=>b.points-a.points); let h='<h3>Пользователи</h3><table class="admin-users-table"><thead><tr><th>Игрок</th><th>Email</th><th>Отдел</th><th>Баллы</th><th>Локоины</th><th>Роль</th><th>Статус</th><th>Достижения</th><th>Действия</th></tr></thead><tbody>'; u.forEach(user=>{const av=typeof renderAvatarDiv==='function'?renderAvatarDiv(user):`<div class="avatar-circle" style="background-color:${getColorFromUid(user.uid)}">${getInitials(user.username)}</div>`; h+=`<tr data-user-id="${user.uid}"><td class="player-cell">${av}<span>${user.username}</span></td><td>${user.email}</td><td class="editable" data-field="department">${user.department||'—'}</td><td class="editable" data-field="points">${user.points}</td><td><span class="lokoin-display">${user.lokoin_balance}</span></td><td class="editable" data-field="role">${user.role}</td><td>${user.disabled?'🔒':'✅'}</td><td>${user.achievements.length}</td><td><button class="btn btn-small edit-user-btn">✏️</button><button class="btn btn-small save-user-btn" style="display:none;">💾</button><button class="btn btn-small cancel-user-btn" style="display:none;">❌</button><button class="btn btn-small adjust-lokoin-btn">💰</button><button class="btn btn-small btn-gift gift-item-btn">🎁</button><button class="btn btn-small toggle-block-btn">🔓</button><button class="btn btn-small award-user-btn">🎖️</button></td></tr>`; }); h+='</tbody></table>'; tc.innerHTML=h; attachUserEditHandlers(u); attachLokoinHandlers(u); attachGiftHandlers(u); attachBlockHandlers(u); attachAwardUserHandlers(u); } catch(e){tc.innerHTML='<p>Ошибка.</p>';} }

      function attachUserEditHandlers(users) { document.querySelectorAll('.admin-users-table tbody tr').forEach((row,i)=>{ const user=users[i], edit=row.querySelector('.edit-user-btn'), save=row.querySelector('.save-user-btn'), cancel=row.querySelector('.cancel-user-btn'), cells=row.querySelectorAll('.editable'); cells.forEach(c=>c.dataset.original=c.innerText); edit.addEventListener('click',()=>{ cells.forEach(c=>{ const f=c.dataset.field,v=c.innerText; if(f==='role')c.innerHTML=`<select class="edit-role"><option value="user" ${v==='user'?'selected':''}>user</option><option value="admin" ${v==='admin'?'selected':''}>admin</option></select>`; else if(f==='department')c.innerHTML=`<select class="edit-department">${departmentsCache.map(d=>`<option value="${d.name}" ${v===d.name?'selected':''}>${d.name}</option>`).join('')}</select>`; else if(f==='points')c.innerHTML=`<input type="number" class="edit-points" value="${v}" min="0">`; }); edit.style.display='none';save.style.display='inline-block';cancel.style.display='inline-block'; }); save.addEventListener('click',async()=>{ const nd={}; cells.forEach(c=>{ const f=c.dataset.field; if(f==='role')nd.role=c.querySelector('select').value; else if(f==='department')nd.department=c.querySelector('select').value; else if(f==='points')nd.points=parseInt(c.querySelector('input').value,10)||0; }); try{await db.collection('users').doc(user.uid).update(nd);showToast('Обновлено','success');Object.assign(user,nd);cells.forEach(c=>{c.innerText=nd[c.dataset.field];c.dataset.original=c.innerText;});edit.style.display='inline-block';save.style.display='none';cancel.style.display='none';}catch(err){showToast('Ошибка: '+err.message,'error');}}); cancel.addEventListener('click',()=>{cells.forEach(c=>c.innerText=c.dataset.original);edit.style.display='inline-block';save.style.display='none';cancel.style.display='none';}); }); }

      function attachLokoinHandlers(users) { document.querySelectorAll('.admin-users-table tbody tr').forEach((row,i)=>{ const u=users[i], btn=row.querySelector('.adjust-lokoin-btn'), d=row.querySelector('.lokoin-display'); if(btn) btn.addEventListener('click',()=>openLokoinModal(u,d)); }); }
      let curLokoinUser=null, curLokoinDisp=null;
      function openLokoinModal(u,d) { curLokoinUser=u; curLokoinDisp=d; document.getElementById('lokoin-amount').value=''; document.getElementById('lokoin-comment').value=''; document.getElementById('lokoin-message').textContent=''; document.getElementById('lokoin-modal').style.display='flex'; }
      document.getElementById('lokoin-modal-close').addEventListener('click',()=>{document.getElementById('lokoin-modal').style.display='none';});
      document.getElementById('lokoin-submit').addEventListener('click',async()=>{ const a=parseInt(document.getElementById('lokoin-amount').value.trim(),10); if(isNaN(a)||a===0){document.getElementById('lokoin-message').textContent='Введите число.';return;} try{ const ref=db.collection('users').doc(curLokoinUser.uid); const doc=await ref.get(); const old=doc.data().lokoin_balance||0; const nb=old+a; if(nb<0){document.getElementById('lokoin-message').textContent='Недостаточно.';return;} await ref.update({lokoin_balance:nb}); curLokoinUser.lokoin_balance=nb; curLokoinDisp.textContent=nb; document.getElementById('lokoin-modal').style.display='none'; showToast('Обновлено','success'); if(typeof addLokoinNotification==='function') addLokoinNotification(curLokoinUser.uid,a,document.getElementById('lokoin-comment').value.trim()); } catch(err){document.getElementById('lokoin-message').textContent='Ошибка: '+err.message;} });

      function attachGiftHandlers(users) { document.querySelectorAll('.admin-users-table tbody tr').forEach((row,i)=>{ const u=users[i], btn=row.querySelector('.gift-item-btn'); if(btn) btn.addEventListener('click',()=>openGiftModal(u)); }); }
      let curGiftUser=null;
      async function openGiftModal(u) { curGiftUser=u; document.getElementById('gift-user-name').textContent=`Пользователь: ${u.username}`; document.getElementById('gift-message').textContent=''; const s=document.getElementById('gift-item-select'); s.innerHTML='<option value="">Загрузка...</option>'; document.getElementById('gift-modal').style.display='flex'; try{ const snap=await db.collection('shopItems').get(); const items=[]; snap.forEach(d=>items.push({id:d.id,...d.data()})); s.innerHTML=items.length?items.map(i=>`<option value="${i.id}">${i.icon||'🛒'} ${i.title} (${i.price} лок.)</option>`).join(''):'<option>Нет товаров</option>'; } catch(e){s.innerHTML='<option>Ошибка</option>';} }

ите текст.';return;}const link=li.value.trim();sb.disabled=true;pb.style.display='block';pf.style.width='0%';sm.textContent='Отправка...';try{let users=[];const t=ts.value;if(t==='all'){const s=await db.collection('users').get();s.forEach(doc=>users.push(doc.id));}else{const field=t==='department'?'department':t==='role'?'role':'__name__';const v=fv.value;if(!v){sm.textContent='Выберите значение.';sb.disabled=false;return;}const s=await db.collection('users').where(field,'==',v).get();s.forEach(doc=>users.push(doc.id));}if(!users.length){sm.textContent='Нет пользователей.';sb.disabled=false;return;}let sent=0;for(const uid of users){await addNotification(uid,msg,'admin',link||'');sent++;pf.style.width=(sent/users.length*100)+'%';}sm.textContent=`Отправлено (${sent} шт.)`;showToast(`Разослано ${sent}`,`success`);}catch(err){sm.textContent='Ошибка: '+err.message;}finally{sb.disabled=false;pb.style.display='none';}}); }

      async function renderNewsTab() { const tc=document.getElementById('admin-tab-content'); tc.innerHTML='<p>Загрузка...</p>'; try{const s=await db.collection('announcements').orderBy('createdAt','desc').get();const a=[];s.forEach(d=>a.push({id:d.id,...d.data()}));let h=`<h3>Новости</h3><ul class="announcements-list">`;a.forEach(x=>{const dt=x.createdAt?new Date(x.createdAt.seconds*1000).toLocaleString('ru-RU'):'';h+=`<li><div><strong>${x.title}</strong> — ${x.body?x.body.substring(0,50)+'...':''}<br><small>${dt}</small></div><div><button class="btn btn-small edit-news-btn" data-news-id="${x.id}">✏️</button><button class="btn btn-small btn-danger delete-news-btn" data-news-id="${x.id}">Удалить</button></div></li>`;});h+='</ul><button class="btn" id="add-news-btn" style="margin-top:1rem;">➕ Создать</button>';tc.innerHTML=h;document.getElementById('add-news-btn').addEventListener('click',()=>openNewsModal());document.querySelectorAll('.edit-news-btn').forEach(b=>b.addEventListener('click',e=>{const n=a.find(x=>x.id===e.target.dataset.newsId);if(n)openNewsModal(n);}));document.querySelectorAll('.delete-news-btn').forEach(b=>b.addEventListener('click',async e=>{if(confirm('Удалить?')){await db.collection('announcements').doc(e.target.dataset.newsId).delete();showToast('Удалена','success');renderNewsTab();}}));}catch(e){tc.innerHTML='<p>Ошибка.</p>';} }
      let curNewsId=null;
      function openNewsModal(news=null) { const m=document.getElementById('news-modal'); document.getElementById('news-message').textContent=''; if(news){curNewsId=news.id;document.getElementById('news-modal-title').textContent='Редактировать';document.getElementById('news-title').value=news.title||'';document.getElementById('news-body').value=news.body||'';document.getElementById('news-icon').value=news.icon||'📢';document.getElementById('news-image-url').value=news.imageUrl||'';document.getElementById('news-video-url').value=news.videoUrl||'';document.getElementById('news-link').value=news.link||'';document.getElementById('news-publish-at').value=news.publishAt?toDatetimeLocal(news.publishAt.toDate()):'';document.getElementById('news-expire-at').value=news.expireAt?toDatetimeLocal(news.expireAt.toDate()):'';document.getElementById('news-notify-all').checked=false;}else{curNewsId=null;document.getElementById('news-modal-title').textContent='Создать';document.getElementById('news-title').value='';document.getElementById('news-body').value='';document.getElementById('news-icon').value='📢';document.getElementById('news-image-url').value='';document.getElementById('news-video-url').value='';document.getElementById('news-link').value='';document.getElementById('news-publish-at').value='';document.getElementById('news-expire-at').value='';document.getElementById('news-notify-all').checked=false;} m.style.display='flex'; }
      function toDatetimeLocal(date) { return date.toISOString().slice(0,16); }
      document.getElementById('news-modal-close').addEventListener('click',()=>{document.getElementById('news-modal').style.display='none';});
      document.getElementById('news-save-btn').addEventListener('click',async()=>{const title=document.getElementById('news-title').value.trim();if(!title){document.getElementById('news-message').textContent='Введите заголовок';return;}const data={title,body:document.getElementById('news-body').value.trim(),icon:document.getElementById('news-icon').value.trim()||'📢',imageUrl:document.getElementById('news-image-url').value.trim(),videoUrl:document.getElementById('news-video-url').value.trim(),link:document.getElementById('news-link').value.trim(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};const ps=document.getElementById('news-publish-at').value;data.publishAt=ps?firebase.firestore.Timestamp.fromDate(new Date(ps)):firebase.firestore.FieldValue.serverTimestamp();const es=document.getElementById('news-expire-at').value;data.expireAt=es?firebase.firestore.Timestamp.fromDate(new Date(es)):null;try{if(curNewsId)await db.collection('announcements').doc(curNewsId).update(data);else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection('announcements').add(data);}if(document.getElementById('news-notify-all').checked){const s=await db.collection('users').get();const uids=[];s.forEach(d=>uids.push(d.id));for(const uid of uids)await addNotification(uid,`Новая новость: ${title}`,'system','index.html');}showToast(curNewsId?'Обновлена':'Создана','success');document.getElementById('news-modal').style.display='none';renderNewsTab();}catch(err){document.getElementById('news-message').textContent='Ошибка: '+err.message;}});

      // ----- Экспорт -----
      function renderExportTab() { const tc=document.getElementById('admin-tab-content'); tc.innerHTML='<h3>Экспорт</h3><button class="btn export-btn" id="export-csv-btn">Скачать CSV</button>'; document.getElementById('export-csv-btn').addEventListener('click',async()=>{try{const s=await db.collection('users').get();const rows=[['UID','Имя','Email','Отдел','Баллы','Локоины','Роль','Заблокирован']];s.forEach(doc=>{const u=doc.data();rows.push([doc.id,u.username||'',u.email||'',u.department||'',u.points||0,u.lokoin_balance||0,u.role||'user',u.disabled?'Да':'Нет']);});let csv='\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='users.csv';a.click();URL.revokeObjectURL(url);showToast('Экспорт готов','success');}catch(err){showToast('Ошибка','error');}}); }
    });
  </script>
