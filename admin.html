<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .feedback-list { margin-top: 1rem; }
    .feedback-item { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .feedback-item-header { margin-bottom: 0.5rem; }
    .feedback-item-header small { color: #999; }
    .btn-gift { background: #9b59b6; color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-left: 0.3rem; }
    .btn-gift:hover { background: #8e44ad; }
    .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0.1rem; }
    .mass-notif-form { background: #f9f9fb; padding: 1.5rem; border-radius: 12px; max-width: 600px; margin-top: 1rem; }
    .mass-notif-form select, .mass-notif-form input, .mass-notif-form textarea { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    .progress-bar { width: 100%; background: #eee; border-radius: 8px; height: 20px; margin: 1rem 0; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #27ae60; width: 0%; transition: width 0.2s; }
  </style>
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="shop.html" class="nav__link">Магазин</a></li>
          <li><a href="profile.html" class="nav__link">Профиль</a></li>
          <li><a href="admin.html" class="nav__link active">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container" id="admin-container"></div>
  </main>

  <!-- Модальное окно для изменения локоинов -->
  <div class="modal-overlay" id="lokoin-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="lokoin-modal-close">&times;</span>
      <h3>Изменить баланс локоинов</h3>
      <div class="form-group"><label for="lokoin-amount">Количество</label><input type="number" id="lokoin-amount" step="1"></div>
      <div class="form-group"><label for="lokoin-comment">Комментарий</label><input type="text" id="lokoin-comment"></div>
      <button class="btn" id="lokoin-submit">Применить</button>
      <p id="lokoin-message" class="auth-message"></p>
    </div>
  </div>

  <!-- Модальное окно для редактирования товара -->
  <div class="modal-overlay" id="shop-item-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="shop-item-modal-close">&times;</span>
      <h3>Редактировать товар</h3>
      <div id="shop-item-id-display"></div>
      <div class="form-group"><label for="shop-item-title">Название</label><input type="text" id="shop-item-title" required></div>
      <div class="form-group"><label for="shop-item-desc">Описание</label><textarea id="shop-item-desc" rows="3"></textarea></div>
      <div class="form-group"><label for="shop-item-category">Категория</label><input type="text" id="shop-item-category"></div>
      <div class="form-group"><label for="shop-item-price">Цена</label><input type="number" id="shop-item-price" min="1" required></div>
      <div class="form-group"><label for="shop-item-icon">Иконка</label><input type="text" id="shop-item-icon" value="🛒"></div>
      <div class="form-group"><label for="shop-item-effect">Эффект</label><input type="text" id="shop-item-effect"></div>
      <div class="form-group"><label for="shop-item-unique">Уникальный</label><select id="shop-item-unique"><option value="true">Да</option><option value="false">Нет</option></select></div>
      <button class="btn" id="shop-item-save">Сохранить</button>
      <p id="shop-item-message" class="auth-message"></p>
    </div>
  </div>

  <!-- Модальное окно для дарения товара -->
  <div class="modal-overlay" id="gift-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="gift-modal-close">&times;</span>
      <h3>Подарить товар</h3>
      <p id="gift-user-name"></p>
      <div class="form-group"><label for="gift-item-select">Товар</label><select id="gift-item-select"></select></div>
      <button class="btn" id="gift-submit">Подарить</button>
      <p id="gift-message" class="auth-message"></p>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feedback.js"></script>

  <script>
    const DEPARTMENTS = ['РБ (Физические лица)','МСБ (Юридические лица)','ТМ (Телемаркетинг)','Депозиты','ОКК','ООБП','Боссы','Заблудшие души КЦ'];

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('admin-container');

      auth.onAuthStateChanged(async (firebaseUser) => {
        if (!firebaseUser) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
        try {
          const doc = await db.collection('users').doc(firebaseUser.uid).get();
          if (!doc.exists || doc.data().role !== 'admin') { container.innerHTML = '<p>Доступ запрещён.</p>'; return; }
          renderAdminPanel();
        } catch (err) { container.innerHTML = '<p>Ошибка.</p>'; }
      });

      function renderAdminPanel() {
        container.innerHTML = `
          <h2>Административная панель</h2>
          <div class="admin-tabs">
            <button class="admin-tab active" data-tab="games">Игры</button>
            <button class="admin-tab" data-tab="users">Пользователи</button>
            <button class="admin-tab" data-tab="feedback">Обращения</button>
            <button class="admin-tab" data-tab="shop">Магазин</button>
            <button class="admin-tab" data-tab="notifications">Уведомления</button>
          </div>
          <div id="admin-tab-content" class="admin-tab-content"></div>
        `;
        const tabs = document.querySelectorAll('.admin-tab');
        const content = document.getElementById('admin-tab-content');
        tabs.forEach(t => t.addEventListener('click', () => {
          tabs.forEach(b => b.classList.remove('active'));
          t.classList.add('active');
          loadTab(t.dataset.tab);
        }));
        loadTab('games');
        function loadTab(tab) {
          switch (tab) {
            case 'games': renderGamesTab(); break;
            case 'users': renderUsersTab(); break;
            case 'feedback': renderFeedbackTab(); break;
            case 'shop': renderShopTab(); break;
            case 'notifications': renderNotificationsTab(); break;
          }
        }
      }

      // ... (функции renderGamesTab, renderUsersTab, renderFeedbackTab, renderShopTab остаются без изменений, 
      // но теперь уже с блокировкой и дарением, которые были добавлены ранее)

      // ----- НОВАЯ ВКЛАДКА: Массовые уведомления -----
      function renderNotificationsTab() {
        const tabContent = document.getElementById('admin-tab-content');
        tabContent.innerHTML = `
          <h3>Массовая рассылка уведомлений</h3>
          <div class="mass-notif-form">
            <div class="form-group">
              <label for="notif-target">Кому отправить</label>
              <select id="notif-target">
                <option value="all">Всем пользователям</option>
                <option value="department">По отделу</option>
                <option value="role">По роли</option>
                <option value="user">Конкретному пользователю</option>
              </select>
            </div>
            <div class="form-group" id="notif-filter-group" style="display:none;">
              <label for="notif-filter-value">Значение фильтра</label>
              <select id="notif-filter-value"></select>
            </div>
            <div class="form-group">
              <label for="notif-message">Текст уведомления</label>
              <textarea id="notif-message" rows="3" required placeholder="Введите сообщение..."></textarea>
            </div>
            <div class="form-group">
              <label for="notif-link">Ссылка (необязательно)</label>
              <input type="text" id="notif-link" placeholder="Например, leaderboard.html">
            </div>
            <button class="btn" id="send-notif-btn">Отправить</button>
            <div class="progress-bar" id="notif-progress"><div class="progress-fill" id="notif-progress-fill"></div></div>
            <p id="notif-status" class="auth-message"></p>
          </div>
        `;

        const targetSelect = document.getElementById('notif-target');
        const filterGroup = document.getElementById('notif-filter-group');
        const filterValue = document.getElementById('notif-filter-value');
        const messageInput = document.getElementById('notif-message');
        const linkInput = document.getElementById('notif-link');
        const sendBtn = document.getElementById('send-notif-btn');
        const progressBar = document.getElementById('notif-progress');
        const progressFill = document.getElementById('notif-progress-fill');
        const statusMsg = document.getElementById('notif-status');

        // Заполняем фильтры в зависимости от выбора
        async function updateFilterOptions() {
          const target = targetSelect.value;
          filterGroup.style.display = (target === 'all') ? 'none' : 'block';
          filterValue.innerHTML = '';
          if (target === 'department') {
            const snap = await db.collection('users').get();
            const depts = [...new Set(snap.docs.map(d => d.data().department).filter(Boolean))];
            depts.forEach(d => filterValue.add(new Option(d, d)));
          } else if (target === 'role') {
            ['user', 'admin'].forEach(r => filterValue.add(new Option(r, r)));
          } else if (target === 'user') {
            const snap = await db.collection('users').get();
            snap.forEach(doc => {
              const d = doc.data();
              filterValue.add(new Option(d.username || d.email, doc.id));
            });
          }
        }
        targetSelect.addEventListener('change', updateFilterOptions);
        updateFilterOptions();

        sendBtn.addEventListener('click', async () => {
          const message = messageInput.value.trim();
          if (!message) { statusMsg.textContent = 'Введите текст уведомления.'; return; }
          const link = linkInput.value.trim();
          sendBtn.disabled = true;
          progressBar.style.display = 'block';
          progressFill.style.width = '0%';
          statusMsg.textContent = 'Отправка...';

          try {
            let users = [];
            const target = targetSelect.value;
            if (target === 'all') {
              const snap = await db.collection('users').get();
              snap.forEach(doc => users.push(doc.id));
            } else {
              const field = target === 'department' ? 'department' : target === 'role' ? 'role' : '__name__';
              const value = filterValue.value;
              if (!value) { statusMsg.textContent = 'Выберите значение фильтра.'; sendBtn.disabled = false; return; }
              const snap = await db.collection('users').where(field, '==', value).get();
              snap.forEach(doc => users.push(doc.id));
            }
            if (users.length === 0) { statusMsg.textContent = 'Нет пользователей для рассылки.'; sendBtn.disabled = false; return; }

            let sent = 0;
            for (const uid of users) {
              await addNotification(uid, message, 'admin', link || '');
              sent++;
              progressFill.style.width = (sent / users.length * 100) + '%';
            }
            statusMsg.textContent = `Уведомления отправлены (${sent} шт.)`;
            showToast(`Разослано ${sent} уведомлений`, 'success');
          } catch (err) {
            console.error(err);
            statusMsg.textContent = 'Ошибка: ' + err.message;
            showToast('Ошибка рассылки', 'error');
          } finally {
            sendBtn.disabled = false;
            progressBar.style.display = 'none';
          }
        });
      }

      // Остальные функции (игры, пользователи, обращения, магазин) остаются как в предыдущей версии,
      // включая блокировку и дарение товаров. Для экономии места я не дублирую их здесь, но в реальном файле они будут.
      // При необходимости я могу предоставить полный код со всеми вкладками.
    });
  </script>
</body>
</html>
