<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин – Админ-панель – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-page { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: var(--color-primary); text-decoration: none; }
    .admin-users-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 1rem; }
    .admin-users-table th, .admin-users-table td { padding: 0.5rem; border-bottom: 1px solid #eee; text-align: left; }
    .admin-users-table th { background: #f9f9f9; font-weight: 600; }
    .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; margin: 0 0.1rem; }
    .btn-danger { background: #e74c3c; color: white; }
    .add-form { background: #f9fafb; border-radius: 12px; padding: 1.5rem; max-width: 600px; margin-top: 2rem; }
    .add-form h4 { margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px; }
    .skeleton-cell { height: 1rem; background: #e0e0e0; border-radius: 4px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .modal { max-width: 550px; }
    .checkbox-group { display: flex; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body>
  <header class="header"><div class="container header__inner"><a href="index.html" class="logo">КЦ-Игры</a><button class="burger" id="burger-btn" aria-label="Меню">☰</button><nav class="nav" id="main-nav"><ul class="nav__list"><li><a href="index.html" class="nav__link">Главная</a></li><li><a href="games.html" class="nav__link">Игры</a></li><li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li><li><a href="shop.html" class="nav__link">Магазин</a></li><li><a href="profile.html" class="nav__link">Профиль</a></li><li><a href="admin.html" class="nav__link active">Админ</a></li></ul></nav><div id="auth-status" class="auth-status"></div></div></header>
  <main class="main"><div class="container admin-page" id="admin-container"><p>Загрузка...</p></div></main>

  <!-- Модальное окно редактирования товара -->
  <div class="modal-overlay" id="shop-item-modal" style="display:none;">
    <div class="modal">
      <span class="modal-close" id="shop-item-modal-close">&times;</span>
      <h3>Редактировать товар</h3>
      <div id="shop-item-id-display"></div>
      <div class="form-group"><label>Название *</label><input type="text" id="shop-item-title" required></div>
      <div class="form-group"><label>Описание</label><textarea id="shop-item-desc" rows="2"></textarea></div>
      <div class="form-group"><label>Категория</label><select id="shop-item-category">
        <option value="Кастомизация">Кастомизация</option><option value="Реакции">Реакции</option>
        <option value="Игровые бонусы">Игровые бонусы</option><option value="Рабочие плюшки">Рабочие плюшки</option>
        <option value="Особые товары">Особые товары</option>
      </select></div>
      <div class="form-group"><label>Цена *</label><input type="number" id="shop-item-price" min="1" required></div>
      <div class="form-group"><label>Иконка</label><input type="text" id="shop-item-icon" value="🛒"></div>
      <div class="form-group"><label>Эффект</label><input type="text" id="shop-item-effect"></div>
      <div class="form-group"><label>Длительность (ч, 0=бессрочно)</label><input type="number" id="shop-item-duration" value="0" min="0"></div>
      <div class="form-group"><label>Уникальный</label><select id="shop-item-unique"><option value="true">Да</option><option value="false">Нет</option></select></div>
      <div class="form-group"><label>Уведомить админа</label><select id="shop-item-notify-admin"><option value="false">Нет</option><option value="true">Да</option></select></div>
      <div class="form-group"><label>Количество (пусто=∞)</label><input type="number" id="shop-item-stock"></div>
      <div class="form-group checkbox-group"><label><input type="checkbox" id="shop-item-hidden"> Скрыть товар</label></div>
      <button class="btn" id="shop-item-save">Сохранить</button>
      <p id="shop-item-message" class="auth-message"></p>
    </div>
  </div>

  <footer class="footer"><div class="container"><p>© 2026 ваши амбассадоры</p></div></footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feedback.js"></script>

  <script>
    (function() {
      const CACHE_KEY = 'krugames_admin_shop';
      const CACHE_TTL = 2 * 60 * 1000;
      let allItems = [];

      function getCachedItems() {
        const cached = sessionStorage.getItem(CACHE_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.timestamp < CACHE_TTL) return parsed.data;
          } catch (e) {}
        }
        return null;
      }

      function setCachedItems(items) {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: items }));
      }

      let curEditShopId = null;

      document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('admin-container');

        auth.onAuthStateChanged(async fbUser => {
          if (!fbUser) { container.innerHTML = '<p>Вы не авторизованы.</p>'; return; }
          try {
            const d = await db.collection('users').doc(fbUser.uid).get();
            if (!d.exists || d.data().role !== 'admin') { container.innerHTML = '<p>Доступ запрещён.</p>'; return; }
            renderPage();
          } catch (e) { container.innerHTML = `<p>Ошибка: ${e.message}</p>`; }
        });

        function renderPage() {
          container.innerHTML = `
            <a href="admin.html" class="back-link">← В админку</a>
            <h2>🛒 Управление товарами магазина</h2>
            <div id="items-table-container"></div>
            <div class="add-form">
              <h4>➕ Добавить товар</h4>
              <form id="add-shop-item-form">
                <div class="form-group"><label>ID</label><input type="text" id="shop-id"></div>
                <div class="form-group"><label>Название *</label><input type="text" id="shop-title" required></div>
                <div class="form-group"><label>Описание</label><textarea id="shop-desc" rows="2"></textarea></div>
                <div class="form-group"><label>Категория</label><select id="shop-category">
                  <option value="Кастомизация">Кастомизация</option><option value="Реакции">Реакции</option>
                  <option value="Игровые бонусы">Игровые бонусы</option><option value="Рабочие плюшки">Рабочие плюшки</option>
                  <option value="Особые товары">Особые товары</option>
                </select></div>
                <div class="form-group"><label>Цена *</label><input type="number" id="shop-price" min="1" required></div>
                <div class="form-group"><label>Иконка</label><input type="text" id="shop-icon" value="🛒"></div>
                <div class="form-group"><label>Эффект</label><input type="text" id="shop-effect"></div>
                <div class="form-group"><label>Длительность</label><input type="number" id="shop-duration" value="0" min="0"></div>
                <div class="form-group"><label>Уникальный</label><select id="shop-unique"><option value="true">Да</option><option value="false">Нет</option></select></div>
                <div class="form-group"><label>Уведомить админа</label><select id="shop-notify-admin"><option value="false">Нет</option><option value="true">Да</option></select></div>
                <div class="form-group"><label>Количество</label><input type="number" id="shop-stock"></div>
                <div class="form-group checkbox-group"><label><input type="checkbox" id="shop-hidden"> Скрыть товар</label></div>
                <button type="submit" class="btn">Добавить</button>
              </form>
            </div>
          `;

          loadShopItems();
          document.getElementById('add-shop-item-form').addEventListener('submit', async e => {
            e.preventDefault();
            const id = document.getElementById('shop-id').value.trim();
            const ni = {
              title: document.getElementById('shop-title').value.trim(),
              description: document.getElementById('shop-desc').value.trim(),
              category: document.getElementById('shop-category').value,
              price: parseInt(document.getElementById('shop-price').value, 10),
              icon: document.getElementById('shop-icon').value.trim() || '🛒',
              effect: document.getElementById('shop-effect').value.trim(),
              duration: parseInt(document.getElementById('shop-duration').value, 10) || 0,
              unique: document.getElementById('shop-unique').value === 'true',
              notifyAdmin: document.getElementById('shop-notify-admin').value === 'true',
              stock: document.getElementById('shop-stock').value ? parseInt(document.getElementById('shop-stock').value) : null,
              hidden: document.getElementById('shop-hidden').checked
            };
            if (!ni.title || !ni.price) { showToast('Название и цена обязательны', 'error'); return; }
            try {
              if (id) {
                const exists = await db.collection('shopItems').doc(id).get();
                if (exists.exists) { showToast('ID уже есть', 'error'); return; }
                await db.collection('shopItems').doc(id).set(ni);
              } else {
                await db.collection('shopItems').add(ni);
              }
              showToast('Добавлен', 'success');
              document.getElementById('add-shop-item-form').reset();
              loadShopItems();
            } catch (err) { showToast('Ошибка: ' + err.message, 'error'); }
          });

          // Модальное окно редактирования
          document.getElementById('shop-item-modal-close').addEventListener('click', () => {
            document.getElementById('shop-item-modal').style.display = 'none';
          });
          document.getElementById('shop-item-save').addEventListener('click', async () => {
            const u = {
              title: document.getElementById('shop-item-title').value.trim(),
              description: document.getElementById('shop-item-desc').value.trim(),
              category: document.getElementById('shop-item-category').value,
              price: parseInt(document.getElementById('shop-item-price').value, 10),
              icon: document.getElementById('shop-item-icon').value.trim(),
              effect: document.getElementById('shop-item-effect').value.trim(),
              duration: parseInt(document.getElementById('shop-item-duration').value, 10) || 0,
              unique: document.getElementById('shop-item-unique').value === 'true',
              notifyAdmin: document.getElementById('shop-item-notify-admin').value === 'true',
              stock: document.getElementById('shop-item-stock').value ? parseInt(document.getElementById('shop-item-stock').value) : null,
              hidden: document.getElementById('shop-item-hidden').checked
            };
            if (!u.title || !u.price) { document.getElementById('shop-item-message').textContent = 'Название и цена обязательны.'; return; }
            try {
              await db.collection('shopItems').doc(curEditShopId).update(u);
              showToast('Обновлён', 'success');
              document.getElementById('shop-item-modal').style.display = 'none';
              loadShopItems();
            } catch (err) { document.getElementById('shop-item-message').textContent = 'Ошибка: ' + err.message; }
          });
        }

        async function loadShopItems() {
          const tableContainer = document.getElementById('items-table-container');
          tableContainer.innerHTML = '<p>Загрузка...</p>';

          const cached = getCachedItems();
          if (cached) {
            allItems = cached;
            renderTable();
          }

          try {
            const snap = await db.collection('shopItems').get();
            allItems = [];
            snap.forEach(d => allItems.push({ id: d.id, ...d.data() }));
            setCachedItems(allItems);
            renderTable();
          } catch (e) {
            console.error(e);
            if (!allItems.length) tableContainer.innerHTML = '<p>Ошибка загрузки.</p>';
          }
        }

        function renderTable() {
          const tableContainer = document.getElementById('items-table-container');
          let html = `<h3>Товары (${allItems.length})</h3>`;
          if (allItems.length) {
            html += `<table class="admin-users-table"><thead><tr><th>ID</th><th>Название</th><th>Категория</th><th>Цена</th><th>Эффект</th><th>Уник.</th><th>Увед.</th><th>Скрыт</th><th>Действия</th></tr></thead><tbody>`;
            allItems.forEach(i => {
              html += `<tr>
                <td><code>${i.id}</code></td>
                <td>${i.icon || '🛒'} ${i.title}</td>
                <td>${i.category || ''}</td>
                <td>${i.price}</td>
                <td>${i.effect || ''}</td>
                <td>${i.unique ? '✓' : '—'}</td>
                <td>${i.notifyAdmin ? '✓' : '—'}</td>
                <td>${i.hidden ? '🙈' : '👁️'}</td>
                <td>
                  <button class="btn btn-small edit-shop-item-btn" data-id="${i.id}">✏️</button>
                  <button class="btn btn-small btn-danger delete-shop-item-btn" data-id="${i.id}">Удалить</button>
                </td>
              </tr>`;
            });
            html += '</tbody></table>';
          } else {
            html += '<p>Товаров нет.</p>';
          }
          tableContainer.innerHTML = html;

          document.querySelectorAll('.delete-shop-item-btn').forEach(btn => {
            btn.addEventListener('click', async e => {
              if (confirm('Удалить товар?')) {
                await db.collection('shopItems').doc(e.target.dataset.id).delete();
                showToast('Удалён', 'success');
                loadShopItems();
              }
            });
          });

          document.querySelectorAll('.edit-shop-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const item = allItems.find(i => i.id === btn.dataset.id);
              if (item) openEditShopItemModal(item);
            });
          });
        }

        function openEditShopItemModal(item) {
          curEditShopId = item.id;
          document.getElementById('shop-item-title').value = item.title || '';
          document.getElementById('shop-item-desc').value = item.description || '';
          document.getElementById('shop-item-category').value = item.category || 'Кастомизация';
          document.getElementById('shop-item-price').value = item.price || 1;
          document.getElementById('shop-item-icon').value = item.icon || '🛒';
          document.getElementById('shop-item-effect').value = item.effect || '';
          document.getElementById('shop-item-duration').value = item.duration || 0;
          document.getElementById('shop-item-unique').value = item.unique ? 'true' : 'false';
          document.getElementById('shop-item-notify-admin').value = item.notifyAdmin ? 'true' : 'false';
          document.getElementById('shop-item-stock').value = item.stock || '';
          document.getElementById('shop-item-hidden').checked = item.hidden || false;
          document.getElementById('shop-item-message').textContent = '';
          document.getElementById('shop-item-id-display').innerHTML = `<strong>ID:</strong> <code>${item.id}</code>`;
          document.getElementById('shop-item-modal').style.display = 'flex';
        }
      });
    })();
  </script>
</body>
</html>
