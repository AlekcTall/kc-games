<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль – Геймификация КЦ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">КЦ-Игры</a>
      <button class="burger" id="burger-btn" aria-label="Меню">☰</button>
      <nav class="nav" id="main-nav">
        <ul class="nav__list">
          <li><a href="index.html" class="nav__link">Главная</a></li>
          <li><a href="games.html" class="nav__link">Игры</a></li>
          <li><a href="leaderboard.html" class="nav__link">Рейтинг</a></li>
          <li><a href="profile.html" class="nav__link active">Профиль</a></li>
          <li><a href="admin.html" class="nav__link">Админ</a></li>
        </ul>
      </nav>
      <div id="auth-status" class="auth-status"></div>
    </div>
  </header>

  <main class="main">
    <div class="container" id="profile-container">
      <!-- Контент будет подставлен через JS -->
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 Контактный центр. Геймификация труда.</p>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <!-- Наш новый модуль Firebase -->
  <script src="js/firebase-auth.js"></script>
  <!-- Старые скрипты (для игр и достижений) -->
  <script src="js/storage.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/easter-eggs.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Локальный список отделов (можно вынести в глобальный конфиг)
    const DEPARTMENTS = [
      'РБ (Физические лица)',
      'МСБ (Юридические лица)',
      'ТМ (Телемаркетинг)',
      'Депозиты (группа привлечения некредитных продуктов)',
      'ОКК (отдел контроля качества)',
      'ООБП (отдел оптимизации бизнес процессов)',
      'Боссы (начальники и руководители начальников)',
      'Заблудшие души КЦ (в каком отделе КЦ я работаю?)'
    ];

    // Сжатие аватара (функция та же, что и раньше)
    const MAX_AVATAR_FILE_SIZE = 5 * 1024 * 1024;
    const AVATAR_MAX_WIDTH = 400;
    const AVATAR_MAX_HEIGHT = 400;
    const AVATAR_QUALITY = 0.8;
    const AVATAR_TARGET_FORMAT = 'image/jpeg';

    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > AVATAR_MAX_WIDTH || height > AVATAR_MAX_HEIGHT) {
              const ratio = Math.min(AVATAR_MAX_WIDTH / width, AVATAR_MAX_HEIGHT / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL(AVATAR_TARGET_FORMAT, AVATAR_QUALITY);
            resolve(dataUrl);
          };
          img.onerror = () => reject(new Error('Не удалось загрузить изображение'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Ошибка чтения файла'));
        reader.readAsDataURL(file);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('profile-container');

      // Проверяем, вошёл ли пользователь через Firebase
      auth.onAuthStateChanged(async (firebaseUser) => {
        if (firebaseUser) {
          // Пользователь аутентифицирован, загружаем его данные
          const doc = await db.collection('users').doc(firebaseUser.uid).get();
          if (doc.exists) {
            const userData = doc.data();
            const user = {
              uid: firebaseUser.uid,
              email: firebaseUser.email,
              ...userData
            };
            renderProfile(user);
          }
        } else {
          renderLoginForm();
        }
      });

      function renderLoginForm() {
        const optionsHTML = DEPARTMENTS.map(dept => `<option value="${dept}">${dept}</option>`).join('');
        container.innerHTML = `
          <div class="auth-box">
            <h2>Вход или регистрация</h2>
            <div class="auth-tabs">
              <button class="auth-tab active" data-tab="login">Войти</button>
              <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            <form id="auth-form" class="auth-form">
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="example@mail.com">
              </div>
              <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="Введите пароль">
              </div>
              <!-- Поля для регистрации -->
              <div class="form-group" id="reg-extra" style="display:none;">
                <label for="username">Фамилия Имя</label>
                <input type="text" id="username" placeholder="Иванов Иван">
              </div>
              <div class="form-group" id="department-group" style="display:none;">
                <label for="department">Отдел</label>
                <select id="department">
                  <option value="">-- Выберите отдел --</option>
                  ${optionsHTML}
                </select>
              </div>
              <button type="submit" class="btn" id="auth-submit-btn">Войти</button>
            </form>
            <p id="auth-message" class="auth-message"></p>
          </div>
        `;

        const authForm = document.getElementById('auth-form');
        const authMessage = document.getElementById('auth-message');
        const tabButtons = document.querySelectorAll('.auth-tab');
        const submitBtn = document.getElementById('auth-submit-btn');
        const regExtra = document.getElementById('reg-extra');
        const departmentGroup = document.getElementById('department-group');
        let currentTab = 'login';

        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            tabButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            if (currentTab === 'login') {
              submitBtn.textContent = 'Войти';
              regExtra.style.display = 'none';
              departmentGroup.style.display = 'none';
            } else {
              submitBtn.textContent = 'Зарегистрироваться';
              regExtra.style.display = 'block';
              departmentGroup.style.display = 'block';
            }
            authMessage.textContent = '';
          });
        });

        authForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value.trim();
          if (!email || !password) {
            authMessage.textContent = 'Заполните все поля.';
            showToast('Заполните все поля', 'error');
            return;
          }

          try {
            if (currentTab === 'login') {
              await firebaseLogin(email, password);
              // onAuthStateChanged сработает и перерисует профиль
            } else {
              const username = document.getElementById('username').value.trim();
              const department = document.getElementById('department').value;
              if (!username || !department) {
                authMessage.textContent = 'Введите Фамилию Имя и выберите отдел.';
                showToast('Заполните все поля', 'error');
                return;
              }
              await firebaseRegister(email, password, username, department);
              // после регистрации пользователь автоматически войдёт
            }
          } catch (error) {
            authMessage.textContent = error.message;
            showToast(error.message, 'error');
          }
        });
      }

      function renderProfile(user) {
        const achievementsConfig = getAchievementsConfig();
        container.innerHTML = `
          <div class="profile-box">
            <div class="profile-header">
              <img src="${user.avatar || 'assets/default-avatar.png'}" alt="Аватар" class="profile-avatar" id="profile-avatar-img">
              <div>
                <h2>${user.username}</h2>
                <span class="badge badge-${user.role}">${user.role}</span>
                ${user.department ? `<p class="profile-department"><strong>Отдел:</strong> ${user.department}</p>` : ''}
                <p><small>${user.email}</small></p>
              </div>
            </div>
            <div class="profile-details">
              <p><strong>Баллы:</strong> <span id="profile-points">${user.points || 0}</span></p>
              <p><strong>О себе:</strong> <span id="profile-desc-text">${user.description || '—'}</span></p>
            </div>

            <div class="profile-achievements">
              <h3>Достижения (<span id="ach-count">${(user.achievements || []).length}</span>/${achievementsConfig.length})</h3>
              <div class="achievements-grid">
                ${achievementsConfig.map(ach => {
                  const unlocked = (user.achievements || []).includes(ach.id);
                  const hidden = ach.hidden && !unlocked;
                  return `
                    <div class="achievement-item ${unlocked ? 'unlocked' : 'locked'}">
                      <span class="ach-icon">${hidden ? '❓' : ach.icon}</span>
                      <span class="ach-name">${hidden ? '???' : ach.name}</span>
                      ${!hidden && !unlocked ? `<span class="ach-hint">${ach.description}</span>` : ''}
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <div class="profile-edit">
              <h3>Редактировать профиль</h3>
              <div class="form-group">
                <label for="avatar-file">Загрузить аватар</label>
                <input type="file" id="avatar-file" accept="image/*">
                <small>Максимум 5 МБ, будет сжат</small>
              </div>
              <div class="form-group">
                <label for="desc">О себе</label>
                <textarea id="desc" rows="3">${user.description || ''}</textarea>
              </div>
              <button class="btn" id="save-profile-btn">Сохранить</button>
              <p id="profile-save-message" class="auth-message"></p>
            </div>

            <div class="profile-password-change">
              <h3>Сменить пароль</h3>
              <div class="form-group">
                <label for="old-password">Старый пароль</label>
                <input type="password" id="old-password" placeholder="Введите старый пароль">
              </div>
              <div class="form-group">
                <label for="new-password">Новый пароль</label>
                <input type="password" id="new-password" placeholder="Введите новый пароль">
              </div>
              <button class="btn" id="change-password-btn">Сменить пароль</button>
              <p id="password-change-message" class="auth-message"></p>
            </div>

            <button class="btn btn-logout" id="logout-btn">Выйти</button>
          </div>
        `;

        // --- Логика аватара ---
        let selectedAvatarBase64 = null;
        const avatarImg = document.getElementById('profile-avatar-img');
        const avatarFileInput = document.getElementById('avatar-file');
        avatarFileInput.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (file.size > MAX_AVATAR_FILE_SIZE) {
            showToast('Файл слишком большой', 'error');
            avatarFileInput.value = '';
            return;
          }
          try {
            selectedAvatarBase64 = await compressImage(file);
            avatarImg.src = selectedAvatarBase64;
            showToast('Аватар подготовлен', 'info');
          } catch (err) {
            showToast('Ошибка обработки', 'error');
          }
        });

        // Сохранение профиля
        document.getElementById('save-profile-btn').addEventListener('click', async () => {
          const desc = document.getElementById('desc').value.trim();
          const updates = { description: desc };
          if (selectedAvatarBase64) {
            updates.avatar = selectedAvatarBase64;
          }
          try {
            await firebaseUpdateProfile(user.uid, updates);
            showToast('Профиль обновлён', 'success');
            // Обновляем локального пользователя для совместимости
            const updatedUser = { ...user, ...updates };
            syncUserToLocal(updatedUser);
            renderProfile(updatedUser);
            if (window.updateAuthUI) updateAuthUI();
          } catch (err) {
            showToast('Ошибка сохранения', 'error');
          }
        });

        // Смена пароля
        document.getElementById('change-password-btn').addEventListener('click', async () => {
          const oldPassword = document.getElementById('old-password').value;
          const newPassword = document.getElementById('new-password').value.trim();
          if (!oldPassword || !newPassword) {
            showToast('Заполните оба поля', 'error');
            return;
          }
          // Проверяем старый пароль через повторный вход
          try {
            const credential = firebase.auth.EmailAuthProvider.credential(user.email, oldPassword);
            await auth.currentUser.reauthenticateWithCredential(credential);
            await auth.currentUser.updatePassword(newPassword);
            showToast('Пароль изменён', 'success');
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
          } catch (error) {
            showToast('Ошибка: ' + error.message, 'error');
          }
        });

        // Выход
        document.getElementById('logout-btn').addEventListener('click', () => {
          firebaseLogout();
        });
      }
    });
  </script>
</body>
</html>
